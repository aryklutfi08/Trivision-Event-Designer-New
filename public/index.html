const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ============================================================
// MOBILE DETECTION
// ============================================================
const MOBILE_BREAKPOINT = 768;
function useIsMobile() {
  const get = () => (typeof window !== 'undefined' && window.matchMedia)
    ? window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`).matches
    : false;
  const [isMobile, setIsMobile] = useState(get);
  useEffect(() => {
    if (typeof window === 'undefined' || !window.matchMedia) return;
    const mq = window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`);
    const onChange = (e) => setIsMobile(e.matches);
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', onChange);
      else mq.removeListener(onChange);
    };
  }, []);
  return isMobile;
}

// ============================================================
// FULL BUILDING FLOOR PLAN
// Derived from "Floor Plan — TriVision Event Center".

//   z → runs front→back toward the loading docks
// All units in feet. Each room is an axis-aligned rectangle whose
// (x, z) is its front-left corner. Layout is faithful to the plan's
// arrangement and relative sizing rather than survey-exact.
// ============================================================

const BUILDING = {
  widthFt: 101,
  depthFt: 126,
  // type drives floor tint + label styling
  rooms: [
    // ---- LEFT COLUMN (left wall, bottom→top: 46 + 42 + 14 + 8 + 16 = 126) ----
    { id: 'C', name: 'Studio C', sub: 'Optional Breakout Room', x: 0, z: 0, w: 34, d: 46, type: 'event', bookable: 'C', noWall: ['back', 'left', 'right'] },
    { id: 'B', name: 'Studio B', sub: 'Buffet Dining / Breakout', x: 0, z: 46, w: 26, d: 42, type: 'event', bookable: 'B' },
    { id: 'greenroom', name: 'VIP Lounge', sub: 'Green Room', x: 0, z: 88, w: 16, d: 14, type: 'lounge', noWall: ['front'] },
    { id: 'dressing', name: 'Restroom 3', sub: '', x: 0, z: 102, w: 14, d: 8, type: 'restroom', door: { side: 'back' } },

    { id: 'lobby', name: 'Lobby', sub: 'Sitting Area', x: 36, z: 0, w: 20, d: 18, type: 'reception', noWall: ['left'] },

    { id: 'vipmeet', name: 'Conference Room', sub: '', x: 80, z: 0, w: 21, d: 22, type: 'office',
      // Per the floor plan the back-left corner is cut at an angle: the left
      // wall runs straight up, then chamfers across to the back wall. Polygon

    { id: 'restroom1', name: 'Restroom 1', sub: '', x: 86, z: 96.5, w: 15, d: 6.5, type: 'restroom', door: { side: 'right' } },
  ],
  // Key fixtures rendered in 3D (positions are front-left corners, feet).
  fixtures: [
    { kind: 'stage', x: 45, z: 99,  w: 28, d: 8 },           // Main Stage at back of Studio A
    { kind: 'led',   x: 45, z: 107, w: 28, d: 0.6 },         // LED video wall against back wall
    { kind: 'bar',   x: 84, z: 84, w: 3,  d: 14, label: 'Bar' },

  ],
  // Door / opening markers (floor glyphs) at key thresholds.
  doors: [
    { x: 42, z: 1,   label: 'Main Entrance' },
    { x: 60, z: 1,   label: 'Main Entrance' },
    { x: 85, z: 48,  label: 'Lounges' },
    { x: 18, z: 125, label: 'Loading Dock 3' },
    { x: 42, z: 125, label: 'Loading Dock 2' },
    { x: 72, z: 125, label: 'Loading Dock 1' },
  ],
};

// ---- Editable venue structure (admin "Venue Layout" editor) ----
// BUILDING holds the default geometry. Admins can move/resize rooms; the
// overrides are saved server-side and applied here in place. We snapshot the
// defaults so overrides can be (re)applied or reset cleanly, and so poly
// rooms (e.g. the Conference Room chamfer) remap proportionally on resize.
const BUILDING_DEFAULT_GEOM = {};
BUILDING.rooms.forEach(r => {
  BUILDING_DEFAULT_GEOM[r.id] = {
    x: r.x, z: r.z, w: r.w, d: r.d,
    poly: r.poly ? r.poly.map(p => p.slice()) : null,
  };
});

function _vnum(v, fallback) {
  return (typeof v === 'number' && isFinite(v)) ? v : fallback;
}

// Apply saved per-room geometry overrides ({x,z,w,d}) onto BUILDING in place.
function applyVenueOverrides(overrides) {
  const rooms = (overrides && overrides.rooms) || {};
  BUILDING.rooms.forEach(r => {
    const base = BUILDING_DEFAULT_GEOM[r.id];
    if (!base) return;
    const o = rooms[r.id] || {};
    const x = _vnum(o.x, base.x), z = _vnum(o.z, base.z);
    const w = Math.max(_vnum(o.w, base.w), 2), d = Math.max(_vnum(o.d, base.d), 2);
    r.x = x; r.z = z; r.w = w; r.d = d;
    if (base.poly) {
      // remap each chamfer vertex proportionally within the new bounding box
      r.poly = base.poly.map(([bx, bz]) => [
        x + (base.w ? (bx - base.x) / base.w : 0) * w,
        z + (base.d ? (bz - base.z) / base.d : 0) * d,
      ]);
    }
  });
}

// Floor tint + label accent per room type
const ROOM_TYPE_STYLE = {
  event:     { floor: 0x1b2233, label: '#c8a96a', wall: 0x2a2f3d },
  lounge:    { floor: 0x231d24, label: '#c79b8a', wall: 0x352b33 },
  service:   { floor: 0x141821, label: '#8b91a3', wall: 0x252a36 },
  office:    { floor: 0x18202a, label: '#7fa6c8', wall: 0x2a3340 },
  restroom:  { floor: 0x161922, label: '#8b91a3', wall: 0x252a36 },
  kitchen:   { floor: 0x1f1c16, label: '#cbb07a', wall: 0x35301f },
  reception: { floor: 0x1a2230, label: '#c8a96a', wall: 0x2a3340 },
};

// Resolve any room (event space or support room) into a designable "space"
// object the Layout Designer can render. Spaces A/B/C keep their tuned
// dimensions + fixtures from SPACES; all other rooms are derived from
// the BUILDING floor plan so every room can be furnished.
function getSpace(id) {
  if (SPACES[id]) return SPACES[id];
  const r = BUILDING.rooms.find(rm => rm.id === id);
  if (!r) return SPACES.A;
  return {
    id: r.id,
    name: r.name + (r.sub ? ' — ' + r.sub : ''),
    widthFt: r.w,
    depthFt: r.d,
    description: r.sub || '',
    fixtures: [],
  };
}

// Ordered list of every designable room for the Designer's space picker.
const DESIGNABLE_ROOMS = BUILDING.rooms.map(r => ({
  id: r.id,
  label: r.name + (r.sub ? ' — ' + r.sub : ''),
}));

// All measurements in feet
const FURNITURE_LIBRARY = [
  { id: 'round-60', label: 'Small Round Table', type: 'table', shape: 'circle', diameter: 5, capacity: 5, color: '#3b4458', stock: 23 },
  { id: 'round-72', label: 'Big Round Table', type: 'table', shape: 'circle', diameter: 6, capacity: 10, color: '#3b4458', stock: 5 },
  { id: 'cocktail', label: 'Cocktail Table', type: 'table', shape: 'circle', diameter: 2.5, capacity: 4, color: '#4a3d2b', stock: 6 },
  { id: 'rect-6', label: 'Long Table (2×6)', type: 'table', shape: 'rect', w: 6, h: 2, capacity: 6, color: '#3b4458', stock: 10 },
  { id: 'rect-8', label: 'Long Table (3×8)', type: 'table', shape: 'rect', w: 8, h: 3, capacity: 8, color: '#3b4458', stock: 10 },
  { id: 'banquet-chair', label: 'Black Chair', type: 'chair', shape: 'rect', w: 1.5, h: 1.5, capacity: 1, color: '#8a99b8', stock: 200 },
  { id: 'theatre-chair', label: 'Theatre Chair', type: 'chair', shape: 'rect', w: 1.5, h: 1.5, capacity: 1, color: '#8a99b8' },
  { id: 'lounge-sofa', label: 'Lounge Sofa', type: 'lounge', shape: 'rect', w: 5, h: 2.5, capacity: 3, color: '#5a4a3a' },
  { id: 'lounge-chair', label: 'Lounge Chair', type: 'lounge', shape: 'rect', w: 2.5, h: 2.5, capacity: 1, color: '#5a4a3a' },
  { id: 'podium', label: 'Podium / Lectern', type: 'fixture', shape: 'rect', w: 2, h: 1.5, capacity: 0, color: '#c8a96a' },
  { id: 'stage-deck', label: 'Stage Deck 4×8', type: 'fixture', shape: 'rect', w: 8, h: 4, capacity: 0, color: '#2a2f3d' },
  // Drape: an adjustable pipe-and-drape line. Its length lives on the placed
  // item (item.lengthFt), not here — `length` is just the default on add.
  // `stock` is the total FEET of drape available, not a piece count.
  { id: 'drape', label: 'Pipe & Drape', type: 'drape', shape: 'line', length: 10, capacity: 0, color: '#6e5170', stock: 200 },
];

// Furniture the user can manually add from the "Add furniture" panel. The full
// library above still backs presets and previously-saved layouts; this is just
// the subset offered for placement, in display order.
const PALETTE_IDS = ['round-72', 'round-60', 'banquet-chair', 'cocktail', 'rect-8', 'rect-6', 'drape'];

const FURN_BY_ID = Object.fromEntries(FURNITURE_LIBRARY.map(f => [f.id, f]));

// Drape physical thickness (ft) — thin so it reads as a line from above.
const DRAPE_THICK = 0.3;

// Natural (pre-rotation) footprint of a placed item in feet. A drape's length
// is variable and stored on the item, so it can't come from the library alone.
function itemDims(item) {
  const f = FURN_BY_ID[item.furnId];
  if (!f) return { w: 1, h: 1 };
  if (f.type === 'drape') return { w: item.lengthFt || f.length || 10, h: DRAPE_THICK };
  if (f.shape === 'circle') return { w: f.diameter, h: f.diameter };
  return { w: f.w, h: f.h };
}

// ============================================================
// CAPACITY MATH — single source of truth for seat counting.
// A "seat" is somewhere a guest actually sits: chairs and lounges. A table's
// own `capacity` only counts when NO chairs are placed (e.g. standing
// high-tops / cocktail rounds) — otherwise the chairs around the table already
// represent those seats, so adding both would double-count them (the 20
// banquet tables × 10 + 120 chairs = 320 bug). Kept as a top-level pure
// function so it can be unit-tested (see qa/seat-count.mjs).
// ============================================================
function computeStats(items) {
  let chairs = 0, tables = 0, chairSeats = 0, loungeSeats = 0, tableSeats = 0;
  for (const it of items) {
    const f = FURN_BY_ID[it.furnId];
    if (!f) continue;
    if (f.type === 'chair') { chairs++; chairSeats += f.capacity; }
    else if (f.type === 'table') { tables++; tableSeats += f.capacity; }
    else if (f.type === 'lounge') { loungeSeats += f.capacity; }
  }
  const capacity = chairSeats + loungeSeats + (chairs > 0 ? 0 : tableSeats);
  return { chairs, tables, capacity, total: items.length };
}

// ============================================================
// PRESET LAYOUTS — return array of {furnId, xFt, yFt, rotation}
// ============================================================

function presetTheatre(space) {
  const items = [];
  const startY = 16; // below stage
  const endY = space.depthFt - 4;
  const chairSpacing = 2; // ft
  const rowSpacing = 3;
  const aisleWidth = 4;
  const halfWidth = (space.widthFt - aisleWidth) / 2;
  const seatsPerHalf = Math.floor(halfWidth / chairSpacing);
  const startXLeft = (space.widthFt - aisleWidth) / 2 - seatsPerHalf * chairSpacing + 1;
  const startXRight = (space.widthFt + aisleWidth) / 2 + 1;
  const maxSeats = 250;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < seatsPerHalf; i++) {
      if (items.length >= maxSeats) return items;
      items.push({ furnId: 'banquet-chair', xFt: startXLeft + i * chairSpacing, yFt: y });
      if (items.length >= maxSeats) return items;
      items.push({ furnId: 'banquet-chair', xFt: startXRight + i * chairSpacing, yFt: y });
    }
  }
  return items;
}

function presetBanquet(space) {
  const items = [];
  const tableSize = 6; // diameter
  const tableSpacingX = 9;
  const tableSpacingY = 9;
  const startY = 18;
  const endY = space.depthFt - 6;
  const cols = Math.floor((space.widthFt - 6) / tableSpacingX);
  const offsetX = (space.widthFt - (cols - 1) * tableSpacingX) / 2 - tableSize / 2;
  const seatsPerTable = 6;
  const maxSeats = 160;
  let seatCount = 0;
  for (let y = startY; y <= endY - tableSpacingY; y += tableSpacingY) {
    for (let c = 0; c < cols; c++) {
      if (seatCount + seatsPerTable > maxSeats) return items;
      const tx = offsetX + c * tableSpacingX;
      items.push({ furnId: 'round-72', xFt: tx, yFt: y });
      // 6 chairs around each table
      const cx = tx + tableSize / 2;
      const cy = y + tableSize / 2;
      const r = tableSize / 2 + 1;
      for (let k = 0; k < seatsPerTable; k++) {
        const a = (k / seatsPerTable) * Math.PI * 2;
        // Chair's "front" should point toward the table center (cx, cy).
        // rotation=0 means facing -z (north / "up" in top-down). The radial
        // direction from table center is (cos a, sin a), so the chair's
        // back is on that vector. Convert that angle to our rotation
        // convention: rotation_deg = (k * 36 - 90), normalized to [0, 360).
        const rotation = ((k * (360 / seatsPerTable) - 90) % 360 + 360) % 360;
        items.push({
          furnId: 'banquet-chair',
          xFt: cx + Math.cos(a) * r - 0.75,
          yFt: cy + Math.sin(a) * r - 0.75,
          rotation,
        });
      }
      seatCount += seatsPerTable;
    }
  }
  return items;
}

function presetClassroom(space) {
  const items = [];
  const startY = 16;
  const endY = space.depthFt - 4;
  const rowSpacing = 5;
  const tableW = 6;
  const tablesPerRow = Math.floor((space.widthFt - 4) / (tableW + 1));
  const offsetX = (space.widthFt - (tablesPerRow * (tableW + 1) - 1)) / 2;
  const maxSeats = 150;
  let seatCount = 0;
  for (let y = startY; y <= endY - rowSpacing; y += rowSpacing) {
    for (let i = 0; i < tablesPerRow; i++) {
      if (seatCount + 3 > maxSeats) return items;
      const tx = offsetX + i * (tableW + 1);
      items.push({ furnId: 'rect-6', xFt: tx, yFt: y });
      // 3 chairs on the audience side (facing stage = facing up)
      items.push({ furnId: 'banquet-chair', xFt: tx + 0.5, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 2.25, yFt: y + 2.7 });
      items.push({ furnId: 'banquet-chair', xFt: tx + 4, yFt: y + 2.7 });
      seatCount += 3;
    }
  }
  return items;
}

function presetUShape(space) {
  const items = [];
  const startY = 18;
  const endY = space.depthFt - 12;
  const sideX1 = space.widthFt / 2 - 8;
  const sideX2 = space.widthFt / 2 + 5;
  // Top of U (closest to stage) — horizontal tables. Chairs sit north of
  // the table and should face SOUTH (down toward the table) → rotation 180.
  for (let i = 0; i < 3; i++) {
    items.push({ furnId: 'rect-6', xFt: sideX1 + i * 6, yFt: startY });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 0.5 + i * 6, yFt: startY - 2, rotation: 180 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 2.25 + i * 6, yFt: startY - 2, rotation: 180 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 + 4 + i * 6, yFt: startY - 2, rotation: 180 });
  }
  // Left side of U — vertical tables. Chairs sit west of the table and
  // should face EAST (right) toward the table → rotation 90.
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX1, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 0.5, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 2.25, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX1 - 2, yFt: y + 4, rotation: 90 });
  }
  // Right side of U — chairs sit east of the table and should face WEST
  // (left) toward the table → rotation 270.
  for (let y = startY + 4; y < endY; y += 6) {
    items.push({ furnId: 'rect-6', xFt: sideX2 + 2.5, yFt: y, rotation: 90 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 0.5, rotation: 270 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 2.25, rotation: 270 });
    items.push({ furnId: 'banquet-chair', xFt: sideX2 + 5, yFt: y + 4, rotation: 270 });
  }
  return items;
}

function presetReception(space) {
  const items = [];
  const cols = Math.floor(space.widthFt / 8);
  const rows = Math.floor((space.depthFt - 14) / 8);
  const offsetX = (space.widthFt - cols * 8) / 2 + 4;
  const offsetY = 16;
  const maxTables = 20;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Stagger
      const ox = (r % 2 === 0) ? 0 : 4;
      const x = offsetX + c * 8 + ox - 1.25;
      const y = offsetY + r * 8 - 1.25;
      if (x < space.widthFt - 3 && y < space.depthFt - 4) {
        if (items.length >= maxTables) return items;
        items.push({ furnId: 'cocktail', xFt: x, yFt: y });
      }
    }
  }
  return items;
}

function loadProjects() {
  try { return JSON.parse(localStorage.getItem(PROJECTS_KEY)) || []; }
  catch (e) { return []; }
}
function persistProjects(list) {

}
