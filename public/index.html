function Designer({ events, currentEvent, onSaveEvent, isMobile, activeProject, onUpdateRoomLayout, onBackToFloorPlan, lockSpaceId, undoRef, onUndoState }) {
  const [spaceId, setSpaceId] = useState(lockSpaceId || currentEvent?.space || 'A');
  const space = getSpace(spaceId);
  const [items, setItems] = useState([]);
  // Multi-select: selectedIds holds every selected item; selectedId (derived)
  // is the lone item when exactly one is selected (drives the single-item panel).
  const [selectedIds, setSelectedIds] = useState([]);
  const [eventName, setEventName] = useState(currentEvent?.name || 'Untitled Event');
  const [eventClient, setEventClient] = useState(currentEvent?.client || '');
  const [eventGuests, setEventGuests] = useState(currentEvent?.guests || 200);
  const [showSaved, setShowSaved] = useState(false);

  // Undo history: each discrete action (a drag, an add/delete, a preset, …)
  // pushes the prior items snapshot so Undo can step back one action at a time.
  const history = useRef([]);
  const prevItemsRef = useRef(items);
  const burstRef = useRef(null);
  const skipHistoryRef = useRef(false);
  const [canUndo, setCanUndo] = useState(false);

  // Project mode: this designer session is editing a room of the active project.
  const projectMode = !!(activeProject && currentEvent?.projectId === activeProject.id);
  const skipPersist = useRef(false);

  // Switch the active room when a new room/event is opened (e.g. from the floor plan)
  useEffect(() => {
    if (currentEvent?.space && currentEvent.space !== spaceId) {
      setSpaceId(currentEvent.space);
    }
    // eslint-disable-next-line
  }, [currentEvent]);

  // Initialize layout when event or space changes
  useEffect(() => {
    // A fresh load is not an undoable action — clear history & don't record it.
    skipHistoryRef.current = true;
    history.current = [];
    setCanUndo(false);
    if (projectMode) {
      // Load this room's saved layout from the active project (may be empty).
      const saved = activeProject.layouts[spaceId] || [];
      skipPersist.current = true;
      setItems(saved.map(it => ({ ...it })));
      setSelectedIds([]);
    } else if (currentEvent?.preset) {
      applyPreset(currentEvent.preset);
    } else {
      // entering a non-event room with no preset → start empty
      setItems([]);
      setSelectedIds([]);
    }
    // eslint-disable-next-line
  }, [currentEvent?.id, spaceId, projectMode]);

  // Persist edits back to the active project (project mode only).
  useEffect(() => {
    if (!projectMode) return;
    if (skipPersist.current) { skipPersist.current = false; return; }
    onUpdateRoomLayout(spaceId, items);
    // eslint-disable-next-line
  }, [items]);

  // Record undo history. A burst of rapid updates (e.g. one drag firing many
  // setItems calls) is coalesced into a single entry: we snapshot the
  // pre-burst state once, then ignore the rest until the burst goes quiet.
  useEffect(() => {
    const prior = prevItemsRef.current;
    prevItemsRef.current = items;
    if (prior === items) return; // no real change (e.g. the empty mount commit)
    if (skipHistoryRef.current) { skipHistoryRef.current = false; return; } // programmatic load
    if (burstRef.current) {
      clearTimeout(burstRef.current);
    } else {
      history.current.push(prior);
      if (history.current.length > 60) history.current.shift();
      setCanUndo(true);
    }
    burstRef.current = setTimeout(() => { burstRef.current = null; }, 350);
    // eslint-disable-next-line
  }, [items]);

  // Revert to the snapshot before the last action.
  const undo = () => {
    if (!history.current.length) return;
    if (burstRef.current) { clearTimeout(burstRef.current); burstRef.current = null; }
    const prev = history.current.pop();
    skipHistoryRef.current = true;
    setItems(prev);
    setSelectedIds([]);
    setCanUndo(history.current.length > 0);
  };

  // Expose undo (+ whether anything can be undone) to the surrounding shell so
  // the guest/client header can drive it.
  useEffect(() => { if (undoRef) undoRef.current = undo; return () => { if (undoRef) undoRef.current = null; }; });
  useEffect(() => { if (onUndoState) onUndoState(canUndo); }, [canUndo]);

  const applyPreset = (presetId) => {
    const preset = PRESETS.find(p => p.id === presetId);
    if (!preset) return;
    // Cap each furniture type to its available stock so a preset never places
    // more than we own (e.g. only 6 Cocktail Tables, 5 Big Round Tables).
    // Presets emit each table immediately followed by its own chairs, so when a
    // type would exceed stock we stop the whole preset — that keeps table+chair
    // groups intact instead of leaving orphan chairs around skipped tables.
    const used = {};
    const placed = [];
    for (const it of preset.fn(space)) {
      const f = FURN_BY_ID[it.furnId];
      const limit = f && f.stock != null && f.type !== 'drape' ? f.stock : Infinity;
      if ((used[it.furnId] || 0) + 1 > limit) break;
      used[it.furnId] = (used[it.furnId] || 0) + 1;
      placed.push({ ...it, id: uid() });
    }
    setItems(placed);
    setSelectedIds([]);
  };

  // ===== Inventory limits =====
  // How many of a furnId are already on the floor.
  const placedCount = (furnId) => items.filter(it => it.furnId === furnId).length;
  // Total feet of pipe-and-drape already on the floor.
  const drapeFeetUsed = (list = items) => list.reduce((a, it) => {
    const f = FURN_BY_ID[it.furnId];
    return a + (f && f.type === 'drape' ? (it.lengthFt || f.length || 0) : 0);
  }, 0);
  // Remaining stock for a palette item: feet for drape, piece count otherwise.
  const remainingStock = (furnId) => {
    const f = FURN_BY_ID[furnId];
    if (!f || f.stock == null) return Infinity;
    return f.type === 'drape' ? f.stock - drapeFeetUsed() : f.stock - placedCount(furnId);
  };

  const addItem = (furnId) => {
    const f = FURN_BY_ID[furnId];
    if (f.type === 'drape') {
      const remaining = remainingStock(furnId);
      if (remaining <= 0) return;
      const L = Math.min(f.length || 10, remaining);
      const it = {
        id: uid(),
        furnId,
        rotation: 0,
        lengthFt: L,
        xFt: space.widthFt / 2 - L / 2,
        yFt: space.depthFt / 2 - DRAPE_THICK / 2,
      };
      setItems(prev => [...prev, it]);
      setSelectedIds([it.id]);
      return;
    }
    if (remainingStock(furnId) <= 0) return;
    const size = f.shape === 'circle' ? f.diameter : Math.max(f.w, f.h);
    const it = {
      id: uid(),
      furnId,
      xFt: space.widthFt / 2 - size / 2,
      yFt: space.depthFt / 2 - size / 2,
    };
    setItems(prev => [...prev, it]);
    setSelectedIds([it.id]);
  };

  const moveItem = (id, xFt, yFt) => {
    const clamped = (v, max, size) => Math.max(0, Math.min(max - size, v));
    setItems(prev => prev.map(it => {
      if (it.id !== id) return it;
      const swap = it.rotation === 90 || it.rotation === 270;
      const dims = itemDims(it);
      const w = swap ? dims.h : dims.w;
      const h = swap ? dims.w : dims.h;
      return { ...it, xFt: clamped(xFt, space.widthFt, w), yFt: clamped(yFt, space.depthFt, h) };
    }));
  };

  // Drag a drape's end-handle: the opposite end stays anchored while this end
  // is pulled. Orientation snaps to the nearest 90° axis; length is free
  // (clamped to a 2 ft minimum and the room's longest side).
  const resizeDrapeEnd = (id, end, fx, fy) => {
    setItems(prev => prev.map(it => {
      if (it.id !== id) return it;
      const f = FURN_BY_ID[it.furnId];
      if (!f || f.type !== 'drape') return it;
      const swap = it.rotation === 90 || it.rotation === 270;
      const L = it.lengthFt || f.length || 10;
      const bw = swap ? DRAPE_THICK : L;
      const bh = swap ? L : DRAPE_THICK;
      const cx = it.xFt + bw / 2, cy = it.yFt + bh / 2;
      // Current endpoints along the drape's axis.
      const a = swap ? { x: cx, y: cy - L / 2 } : { x: cx - L / 2, y: cy };
      const b = swap ? { x: cx, y: cy + L / 2 } : { x: cx + L / 2, y: cy };
      const anchor = end === 'A' ? b : a;
      const ddx = fx - anchor.x, ddy = fy - anchor.y;
      // Cap by the room's longest side AND the remaining drape-feet budget
      // (total feet of all OTHER drape lines must leave room for this one).
      const otherFeet = drapeFeetUsed(prev) - L;
      const budgetLeft = f.stock != null ? Math.max(2, f.stock - otherFeet) : Infinity;
      const maxLen = Math.min(Math.max(space.widthFt, space.depthFt), budgetLeft);
      let rotation, length, ncx, ncy;
      if (Math.abs(ddx) >= Math.abs(ddy)) {
        rotation = 0;
        length = Math.max(2, Math.min(Math.abs(ddx), maxLen));
        ncx = anchor.x + (ddx >= 0 ? 1 : -1) * length / 2;
        ncy = anchor.y;
      } else {
        rotation = 90;
        length = Math.max(2, Math.min(Math.abs(ddy), maxLen));
        ncx = anchor.x;
        ncy = anchor.y + (ddy >= 0 ? 1 : -1) * length / 2;
      }
      const nswap = rotation === 90;
      const nbw = nswap ? DRAPE_THICK : length;
      const nbh = nswap ? length : DRAPE_THICK;
      const nxFt = Math.max(0, Math.min(space.widthFt - nbw, ncx - nbw / 2));
      const nyFt = Math.max(0, Math.min(space.depthFt - nbh, ncy - nbh / 2));
      return { ...it, rotation, lengthFt: length, xFt: nxFt, yFt: nyFt };
    }));
  };

  const deleteItem = (id) => {
    setItems(prev => prev.filter(it => it.id !== id));
    setSelectedIds([]);
  };

  const rotateItem = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, rotation: ((it.rotation || 0) + 90) % 360 } : it));
  };

  const duplicateItem = (id) => {
    const orig = items.find(it => it.id === id);
    if (!orig) return;
    const f = FURN_BY_ID[orig.furnId];
    const remaining = remainingStock(orig.furnId);
    if (f && f.type === 'drape') {
      if (remaining <= 0) return;
      const len = Math.min(orig.lengthFt || f.length || 10, remaining);
      const copy = { ...orig, id: uid(), lengthFt: len, xFt: orig.xFt + 2, yFt: orig.yFt + 2 };
      setItems(prev => [...prev, copy]);
      setSelectedIds([copy.id]);
      return;
    }
    if (remaining <= 0) return;
    const copy = { ...orig, id: uid(), xFt: orig.xFt + 2, yFt: orig.yFt + 2 };
    setItems(prev => [...prev, copy]);
    setSelectedIds([copy.id]);
  };

  // ===== Multi-select helpers =====
  // Click a furniture item. additive (shift / ctrl / ⌘) toggles it in/out of the
  // current selection; a plain click selects just that item.
  const selectItem = (id, additive) => {
    setSelectedIds(prev => {
      if (additive) return prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      return [id];
    });
  };

  // Move every selected item by the same delta (so the group keeps its shape),
  // clamping the delta so the whole group stays inside the room.
  const moveGroup = (ids, dx, dy) => {
    setItems(prev => {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      prev.forEach(it => {
        if (!ids.includes(it.id)) return;
        const swap = it.rotation === 90 || it.rotation === 270;
        const dims = itemDims(it);
        const w = swap ? dims.h : dims.w;
        const h = swap ? dims.w : dims.h;
        minX = Math.min(minX, it.xFt); minY = Math.min(minY, it.yFt);
        maxX = Math.max(maxX, it.xFt + w); maxY = Math.max(maxY, it.yFt + h);
      });
      let ndx = dx, ndy = dy;
      if (minX + ndx < 0) ndx = -minX;
      if (maxX + ndx > space.widthFt) ndx = space.widthFt - maxX;
      if (minY + ndy < 0) ndy = -minY;
      if (maxY + ndy > space.depthFt) ndy = space.depthFt - maxY;
      return prev.map(it => ids.includes(it.id) ? { ...it, xFt: it.xFt + ndx, yFt: it.yFt + ndy } : it);
    });
  };

  const deleteSelected = () => {
    setItems(prev => prev.filter(it => !selectedIds.includes(it.id)));
    setSelectedIds([]);
  };

  const duplicateSelected = () => {
    const copies = items
      .filter(it => selectedIds.includes(it.id))
      .map(it => ({ ...it, id: uid(), xFt: it.xFt + 2, yFt: it.yFt + 2 }));
    if (!copies.length) return;
    setItems(prev => [...prev, ...copies]);
    setSelectedIds(copies.map(c => c.id));
  };

  const rotateSelected = () => {
    setItems(prev => prev.map(it => selectedIds.includes(it.id) ? { ...it, rotation: ((it.rotation || 0) + 90) % 360 } : it));
  };

  const selectAll = () => setSelectedIds(items.map(it => it.id));

  const clearAll = () => {
    if (window.confirm('Clear all items from the floor?')) {
      setItems([]);
      setSelectedIds([]);
    }
  };

  // Stats — see computeStats() for the seat-counting rule.
  const stats = useMemo(() => computeStats(items), [items]);

  // Single-item panel shows only when exactly one item is selected.
  const selectedId = selectedIds.length === 1 ? selectedIds[0] : null;
  const selected = selectedId ? items.find(it => it.id === selectedId) : null;
  const selectedFurn = selected ? FURN_BY_ID[selected.furnId] : null;

  const handleSave = () => {
    setShowSaved(true);
    setTimeout(() => setShowSaved(false), 2000);
  };

  // Export a print-ready, white-background 2D top-down floor plan. We build a
  // standalone HTML doc with an inline SVG (all geometry in feet, scaled to a
  // fixed pixels-per-foot) and open the browser print dialog so workers can
  // print on paper or "Save as PDF".
  const exportPdf = () => {
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const n = (v) => Number(v).toFixed(1);
    const wFt = space.widthFt, dFt = space.depthFt;
    const PPF = 760 / Math.max(wFt, dFt); // px per foot — longer side ≈ 760px
    const W = wFt * PPF, H = dFt * PPF;

    // 5-ft reference grid (faint) so crews can eyeball distances.
    let grid = '';
    for (let gx = 5; gx < wFt; gx += 5) grid += `<line x1="${n(gx * PPF)}" y1="0" x2="${n(gx * PPF)}" y2="${n(H)}" stroke="#eceff3" stroke-width="1"/>`;
    for (let gy = 5; gy < dFt; gy += 5) grid += `<line x1="0" y1="${n(gy * PPF)}" x2="${n(W)}" y2="${n(gy * PPF)}" stroke="#eceff3" stroke-width="1"/>`;

    // Fixtures (stage, doors) drawn beneath furniture.
    const fixtures = (space.fixtures || []).map(fx => {
      const x = fx.x * PPF, y = fx.y * PPF, w = fx.w * PPF, h = fx.h * PPF;
      if (fx.type === 'stage') {
        return `<rect x="${n(x)}" y="${n(y)}" width="${n(w)}" height="${n(h)}" fill="#1f2937" stroke="#111827" stroke-width="1.5"/>`
          + `<text x="${n(x + w / 2)}" y="${n(y + h / 2)}" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="11" font-weight="600">STAGE</text>`;
      }
      return `<rect x="${n(x)}" y="${n(y)}" width="${n(w)}" height="${n(h)}" fill="#ffffff" stroke="#9aa3b2" stroke-width="1.5" stroke-dasharray="4 2"/>`;
    }).join('');

    // Furniture shapes.
    const shapes = items.map(it => {
      const f = FURN_BY_ID[it.furnId];
      if (!f) return '';
      const swap = it.rotation === 90 || it.rotation === 270;
      const dims = itemDims(it);
      const fw = (swap ? dims.h : dims.w) * PPF;
      const fh = (swap ? dims.w : dims.h) * PPF;
      const x = it.xFt * PPF, y = it.yFt * PPF;
      if (f.type === 'drape') {
        if (fw >= fh) {
          const cy = y + fh / 2;
          return `<line x1="${n(x)}" y1="${n(cy)}" x2="${n(x + fw)}" y2="${n(cy)}" stroke="#6b21a8" stroke-width="3" stroke-linecap="round"/>`;
        }
        const cx = x + fw / 2;
        return `<line x1="${n(cx)}" y1="${n(y)}" x2="${n(cx)}" y2="${n(y + fh)}" stroke="#6b21a8" stroke-width="3" stroke-linecap="round"/>`;
      }
      if (f.type === 'chair') {
        return `<rect x="${n(x)}" y="${n(y)}" width="${n(fw)}" height="${n(fh)}" rx="1.5" fill="#aab4c8" stroke="#5b6679" stroke-width="0.8"/>`;
      }
      const label = f.capacity > 0 ? `<text x="${n(x + fw / 2)}" y="${n(y + fh / 2)}" text-anchor="middle" dominant-baseline="central" fill="#2b3445" font-size="9" font-weight="600">${f.capacity}</text>` : '';
      if (f.shape === 'circle') {
        return `<circle cx="${n(x + fw / 2)}" cy="${n(y + fh / 2)}" r="${n(fw / 2)}" fill="#e6ebf2" stroke="#2b3445" stroke-width="1.2"/>` + label;
      }
      return `<rect x="${n(x)}" y="${n(y)}" width="${n(fw)}" height="${n(fh)}" rx="2" fill="#e6ebf2" stroke="#2b3445" stroke-width="1.2"/>` + label;
    }).join('');

    // Counts legend.
    const counts = {};
    items.forEach(it => { counts[it.furnId] = (counts[it.furnId] || 0) + 1; });
    const drapeFeet = items.reduce((a, it) => a + (FURN_BY_ID[it.furnId] && FURN_BY_ID[it.furnId].type === 'drape' ? (it.lengthFt || 0) : 0), 0);
    const legend = Object.keys(counts).map(id => {
      const f = FURN_BY_ID[id];
      const lbl = f ? f.label : id;
      const val = f && f.type === 'drape' ? `${Math.round(drapeFeet)} ft` : counts[id];
      return `<div class="row"><span>${esc(lbl)}</span><span class="qty">${val}</span></div>`;
    }).join('') || '<div class="row"><span>No furniture placed</span></div>';

    const landscape = wFt > dFt;
    const when = new Date().toLocaleString();
    const eventDate = currentEvent && currentEvent.date
      ? new Date(currentEvent.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' })
      : 'Date TBD';
    const sub = [eventClient && esc(eventClient), esc(space.name), `${eventGuests} guests`]
      .filter(Boolean).join('  ·  ');

    const html = `<!doctype html><html><head><meta charset="utf-8"><title>${esc(eventName)} — Floor Plan</title>
<style>
  @page { size: ${landscape ? 'landscape' : 'portrait'}; margin: 0.5in; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; color: #111827; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
  .wrap { padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 2px; }
  .date { font-size: 14px; font-weight: 600; color: #111827; margin: 2px 0 2px; }
  .sub { font-size: 12px; color: #4b5563; margin-bottom: 14px; }
  .meta { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
  .grid { display: flex; gap: 24px; align-items: flex-start; }
  .plan { border: 1px solid #d1d5db; padding: 10px; background: #fff; }
  .legend { min-width: 200px; }
  .legend h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin: 0 0 8px; }
  .row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f0f1f3; }
  .qty { font-weight: 600; }
  .toolbar { position: fixed; top: 12px; right: 12px; }
  .toolbar button { font-size: 13px; padding: 8px 14px; border: 1px solid #111827; background: #111827; color: #fff; border-radius: 6px; cursor: pointer; }
  @media print { .toolbar { display: none; } .wrap { padding: 0; } }
</style></head>
<body>
  <div class="toolbar"><button onclick="window.print()">Print / Save as PDF</button></div>
  <div class="wrap">
    <h1>${esc(eventName)}</h1>
    <div class="date">${esc(eventDate)}</div>
    <div class="sub">${sub}</div>
    <div class="meta">Room ${n(wFt)}&prime; &times; ${n(dFt)}&prime;  ·  Top of plan = Main Stage  ·  Bottom = Entrance  ·  Grid = 5&prime;</div>
    <div class="grid">
      <div class="plan">
        <svg width="${n(W)}" height="${n(H)}" viewBox="0 0 ${n(W)} ${n(H)}" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="${n(W)}" height="${n(H)}" fill="#ffffff" stroke="#111827" stroke-width="2"/>
          ${grid}
          ${fixtures}
          ${shapes}
        </svg>
      </div>
      <div class="legend">
        <h2>Inventory on floor</h2>
        ${legend}
        <div class="meta" style="margin-top:16px">Generated ${esc(when)}</div>
      </div>
    </div>
  </div>
</body></html>`;

    const win = window.open('', '_blank');
    if (!win) { window.alert('Please allow pop-ups to export the floor plan as a PDF.'); return; }
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => { try { win.print(); } catch (e) {} }, 350);
  };

  // Mobile bottom-sheet tab state
  const [mobileTab, setMobileTab] = useState(null); // null | 'setup' | 'items' | 'props'
  // When the user selects an item on mobile, auto-open the props sheet so they can edit it.
  useEffect(() => {
    if (isMobile && selectedIds.length) setMobileTab('props');
    // eslint-disable-next-line
  }, [selectedIds.length, isMobile]);

  // Keyboard shortcuts: Delete/Backspace removes the selection, Escape clears it,
  // ⌘/Ctrl+A selects every item. Ignored while typing in a form field.
  useEffect(() => {
    const onKey = (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIds.length) {
        e.preventDefault();
        deleteSelected();
      } else if (e.key === 'Escape' && selectedIds.length) {
        setSelectedIds([]);
      } else if ((e.metaKey || e.ctrlKey) && (e.key === 'a' || e.key === 'A') && items.length) {
        e.preventDefault();
        selectAll();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
    // eslint-disable-next-line
  }, [selectedIds, items]);

  // Reusable panel contents as render functions
  const renderSetupPanel = () => (
    <div className="flex flex-col">
      <div className="p-4 border-b tv-divider">
        {projectMode && (
          <div className="mb-3 text-[11px] tv-muted">
            Project: <span className="tv-gold font-medium">{activeProject.name}</span>
            <div className="mt-0.5">Editing this room saves to the project. Use <span className="text-white">View Floor Plan</span> to see everything together.</div>
          </div>
        )}
        <div className="text-xs uppercase tv-muted tracking-wider mb-2">{projectMode ? 'Room' : 'Event'}</div>
        <input value={eventName} onChange={e => setEventName(e.target.value)} className="w-full mb-2 text-sm font-medium" />
        <input value={eventClient} onChange={e => setEventClient(e.target.value)} placeholder="Client name" className="w-full mb-2 text-xs" />
        <div className="flex items-center gap-2">
          {lockSpaceId ? (
            <div className="flex-1 text-xs tv-panel-2 border tv-divider rounded px-2.5 py-1.5 tv-gold font-medium">
              {(DESIGNABLE_ROOMS.find(r => r.id === lockSpaceId) || {}).label || ('Studio ' + lockSpaceId)}
            </div>
          ) : (
            <select value={spaceId} onChange={e => setSpaceId(e.target.value)} className="flex-1 text-xs">
              {DESIGNABLE_ROOMS.map(r => (
                <option key={r.id} value={r.id}>{r.label}</option>
              ))}
            </select>
          )}
          <input type="number" value={eventGuests} onChange={e => setEventGuests(Number(e.target.value))} className="w-20 text-xs" />
        </div>
      </div>
      <div className="p-4">
        <div className="text-xs uppercase tv-muted tracking-wider mb-2">Quick presets</div>
        <div className="grid grid-cols-2 gap-2">
          {PRESETS.map(p => (
            <button key={p.id} onClick={() => applyPreset(p.id)}
              className="group tv-panel-2 border tv-divider rounded p-2.5 text-left hover:border-[var(--tv-gold)] transition-colors">
              <div className="text-[var(--tv-muted)] group-hover:text-[var(--tv-gold)] transition-colors">
                <PresetIcon id={p.id} />
              </div>
              <div className="text-xs font-medium mt-1.5">{p.label}</div>
              <div className="text-[10px] tv-muted">{p.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  const renderItemsPanel = () => (
    <div className="p-4">
      <div className="text-xs uppercase tv-muted tracking-wider mb-2">Add furniture</div>
      <div className="space-y-1">
        {PALETTE_IDS.map(id => FURN_BY_ID[id]).filter(Boolean).map(f => {
          const left = remainingStock(f.id);
          const maxed = left <= 0;
          const leftLabel = f.type === 'drape' ? `${Math.max(0, Math.round(left))} ft left` : `${Math.max(0, left)} left`;
          return (
          <button key={f.id} onClick={() => addItem(f.id)} disabled={maxed}
            className={classNames('w-full flex items-center gap-3 px-2 py-2 rounded text-left', maxed ? 'opacity-40 cursor-not-allowed' : 'hover:bg-[#1d212d]')}>
            <div className="w-7 h-7 rounded flex items-center justify-center flex-shrink-0"
                 style={{ background: f.color }}>
              {f.shape === 'circle' && <div className="w-5 h-5 rounded-full border border-white/30"></div>}
              {f.shape === 'rect' && <div className="w-5 h-3 border border-white/30 rounded-sm"></div>}
              {f.shape === 'line' && <div className="w-5 h-0.5 bg-white/60 rounded-full"></div>}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-medium truncate">{f.label}</div>
              <div className="text-[10px] tv-muted">
                {f.type === 'drape' ? `${f.length}' long · adjustable` : (f.shape === 'circle' ? `${f.diameter}' dia` : `${f.w}'×${f.h}'`)}
                {f.capacity > 0 ? ` · seats ${f.capacity}` : ''}
              </div>
            </div>
            <span className={classNames('text-[10px] whitespace-nowrap', maxed ? 'text-red-400' : 'tv-muted')}>{leftLabel}</span>
          </button>
          );
        })}
      </div>
    </div>
  );

  const renderPropsPanel = () => (
    <div className="flex flex-col">
      <div className="p-5 border-b tv-divider">
        <div className="text-xs uppercase tv-muted tracking-wider mb-3">Capacity</div>

function Reports({ events, isMobile }) {
  // Utilization by space
  const utilByPreset = {};
  events.forEach(e => {
    utilByPreset[e.preset] = (utilByPreset[e.preset] || 0) + 1;
  });

  const maxPresetCount = Math.max(1, ...Object.values(utilByPreset));

  // Guest stats derived from the actual events (null when there are none).
  const count = events.length;
  const guests = events.map(e => e.guests).sort((a, b) => a - b);
  const avgGuests = count ? Math.round(guests.reduce((a, b) => a + b, 0) / count) : null;
  const median = count ? (count % 2 ? guests[(count - 1) / 2] : Math.round((guests[count / 2 - 1] + guests[count / 2]) / 2)) : null;
  const biggest = count ? events.reduce((m, e) => e.guests > m.guests ? e : m) : null;
  const smallest = count ? events.reduce((m, e) => e.guests < m.guests ? e : m) : null;

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar

const api = {
  async _req(url, opts = {}) {
    const r = await fetch(url, {
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!r.ok) {
      let msg = 'Request failed';
      try { msg = (await r.json()).error || msg; } catch (e) {}
      const err = new Error(msg);
      err.status = r.status;
      throw err;
    }
    return r.status === 204 ? null : r.json();
  },
  me() { return this._req('/api/me'); },
  login(body) { return this._req('/api/login', { method: 'POST', body: JSON.stringify(body) }); },
  register(body) { return this._req('/api/register', { method: 'POST', body: JSON.stringify(body) }); },
  logout() { return this._req('/api/logout', { method: 'POST' }); },
  listLayouts() { return this._req('/api/layouts'); },
  createLayout(body) { return this._req('/api/layouts', { method: 'POST', body: JSON.stringify(body) }); },
  updateLayout(id, body) { return this._req('/api/layouts/' + id, { method: 'PUT', body: JSON.stringify(body) }); },
  deleteLayout(id) { return this._req('/api/layouts/' + id, { method: 'DELETE' }); },
  getVenue() { return this._req('/api/venue'); },
  saveVenue(rooms) { return this._req('/api/venue', { method: 'PUT', body: JSON.stringify({ rooms }) }); },
  createClientLayout(body) { return this._req('/api/admin/clients', { method: 'POST', body: JSON.stringify(body) }); },
  getInvite(layoutId) { return this._req('/api/admin/layouts/' + layoutId + '/invite'); },
  approveLayout(id) { return this._req('/api/layouts/' + id + '/approve', { method: 'POST' }); },
  approveAllLayouts() { return this._req('/api/layouts/approve-all', { method: 'POST' }); },
  reopenLayout(id) { return this._req('/api/admin/layouts/' + id + '/reopen', { method: 'POST' }); },
  listEvents() { return this._req('/api/events'); },
  createEvent(body) { return this._req('/api/events', { method: 'POST', body: JSON.stringify(body) }); },
  archiveEvent(id, archived) { return this._req('/api/events/' + id, { method: 'PATCH', body: JSON.stringify({ archived }) }); },
  deleteEvent(id) { return this._req('/api/events/' + id, { method: 'DELETE' }); },
};

// Single-layout editor: wraps the Designer with autosave to the backend.
// Reused by the guest app and the admin client-layouts view.
function LayoutEditor({ layout, isMobile, onSaved, onStatus, readOnly, flushRef, undoRef, onUndoState }) {
  const timer = useRef(null);
  const latest = useRef(layout.data || []);

  const activeProject = useMemo(() => ({
    id: layout.id,
    name: layout.name,
    layouts: { [layout.spaceId]: layout.data || [] },
  }), [layout.id]);

  const currentEvent = useMemo(() => ({
    id: layout.id,
    projectId: layout.id,
    name: layout.name,
    space: layout.spaceId,
    guests: 200,
  }), [layout.id]);

  const handleUpdate = (roomId, items) => {
    latest.current = items;
    if (readOnly) return; // approved & locked: keep visual edits ephemeral, never persist
    if (onStatus) onStatus('saving');
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      try {
        const updated = await api.updateLayout(layout.id, { data: latest.current });
        if (onStatus) onStatus('saved');
        if (onSaved) onSaved(updated);
      } catch (e) {
        if (onStatus) onStatus('error');
      }
    }, 700);
  };

  useEffect(() => () => { if (timer.current) clearTimeout(timer.current); }, []);

  // Expose a flush so callers (e.g. the Approve button) can persist any pending
  // debounced edit immediately before acting, instead of losing the last change.
  useEffect(() => {
    if (!flushRef) return;
    flushRef.current = async () => {
      if (timer.current) { clearTimeout(timer.current); timer.current = null; }
      if (readOnly) return;
      try {
        if (onStatus) onStatus('saving');
        const updated = await api.updateLayout(layout.id, { data: latest.current });
        if (onStatus) onStatus('saved');
        if (onSaved) onSaved(updated);
        return updated;
      } catch (e) {
        if (onStatus) onStatus('error');
        throw e;
      }
    };
    return () => { if (flushRef) flushRef.current = null; };
  });

  return (
    <Designer
      key={layout.id}
      events={[]}
      currentEvent={currentEvent}
      isMobile={isMobile}
      activeProject={activeProject}
      onUpdateRoomLayout={handleUpdate}
      lockSpaceId={layout.spaceId}
      undoRef={undoRef}
      onUndoState={onUndoState}
    />
  );
}

function SaveStatus({ status }) {
  const map = {
    saving: { t: 'Saving…', c: 'badge-muted' },
    saved: { t: '✓ Saved', c: 'badge-green' },
    error: { t: '! Save failed', c: 'badge-red' },
  };
  const s = map[status] || map.saved;
  return <span className={classNames('badge', s.c)}>{s.t}</span>;
}

// GUEST APP — locked to the Studio A designer
// ============================================================
function GuestApp({ user, onLogout, initialLayoutId }) {
  const isMobile = useIsMobile();
  const [layouts, setLayouts] = useState(null); // null = loading
  const [activeId, setActiveId] = useState(null);
  const [status, setStatus] = useState('saved');
  const [error, setError] = useState(null);
  const [view, setView] = useState('designer'); // 'designer' | 'floorplan'
  const [approving, setApproving] = useState(false);
  const editorFlush = useRef(null);
  const editorUndo = useRef(null);
  const [canUndo, setCanUndo] = useState(false);

  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        let list = await api.listLayouts();
        if (alive && list.length === 0) {
          const created = await api.createLayout({ name: 'My Studio A Layout', spaceId: 'A', data: [] });
          list = [created];
        }
        if (!alive) return;
        setLayouts(list);
        // Deep-link from a magic invite link opens that specific shared layout.
        const startId = (initialLayoutId && list.some(l => l.id === initialLayoutId))
          ? initialLayoutId : (list[0]?.id || null);
        setActiveId(startId);
      } catch (e) {
        if (alive) setError(e.message || 'Could not load your layouts.');
      }
    })();
    return () => { alive = false; };
  }, []);

  const active = layouts && layouts.find(l => l.id === activeId);

  // Read-only synthetic project so the guest's saved furniture (across every
  // space they've designed) shows up inside the whole-studio floor plan view.
  const floorProject = useMemo(() => {
    if (!layouts) return null;
    const bySpace = {};
    for (const l of layouts) bySpace[l.spaceId] = l.data || [];
    return { id: 'guest-floor', name: user.displayName || 'My Studio', layouts: bySpace };
  }, [layouts, user]);

  const patchInList = (updated) => {
    setLayouts(prev => prev.map(l => l.id === updated.id ? updated : l));
  };

  // The whole floor plan (every space the client touched) is approved together.
  const floorApproved = !!(layouts && layouts.length > 0 && layouts.every(l => l.status === 'approved'));
  const approve = async () => {
    if (!layouts || !layouts.length) return;
    if (!window.confirm('Approve your entire floor plan? Your full design across every space is sent to TriVision. You can keep editing afterward and re-approve to send updates.')) return;
    setApproving(true);
    try {
      // Persist any pending (debounced) edit first so the approval captures the
      // latest design instead of a stale version.
      if (editorFlush.current) await editorFlush.current();
      const updatedList = await api.approveAllLayouts();
      setLayouts(updatedList);
    } catch (e) { window.alert(e.message); }
    finally { setApproving(false); }
  };

  // Click a room in the floor plan → open that space's designer. Re-use an
  // existing layout for the space if the guest already has one, otherwise
  // create a fresh one. Mirrors the admin "open any space" behaviour.
  const openSpace = async (spaceId) => {
    const existing = layouts.find(l => l.spaceId === spaceId);
    if (existing) {
      setActiveId(existing.id);
      setView('designer');
      return;
    }
    try {
      const label = (DESIGNABLE_ROOMS.find(r => r.id === spaceId) || {}).label || ('Studio ' + spaceId);
      const created = await api.createLayout({ name: label, spaceId, data: [] });
      setLayouts(prev => [created, ...prev]);
      setActiveId(created.id);
      setView('designer');
    } catch (e) { window.alert(e.message); }
  };

  const newLayout = async () => {
    const space = active?.spaceId || 'A';
    const name = window.prompt('Name this layout', 'New Layout');
    if (name === null) return;
    try {
      const created = await api.createLayout({ name: name || 'Untitled Layout', spaceId: space, data: [] });
      setLayouts(prev => [created, ...prev]);
      setActiveId(created.id);
    } catch (e) { window.alert(e.message); }
  };

  const deleteLayout = async () => {
    if (!active) return;
    if (!window.confirm(`Delete "${active.name}"? This cannot be undone.`)) return;
    try {
      await api.deleteLayout(active.id);
      const remaining = layouts.filter(l => l.id !== active.id);
      if (remaining.length === 0) {
        const created = await api.createLayout({ name: 'My Studio A Layout', spaceId: 'A', data: [] });
        setLayouts([created]);
        setActiveId(created.id);
      } else {
        setLayouts(remaining);
        setActiveId(remaining[0].id);
      }
    } catch (e) { window.alert(e.message); }
  };

  if (error) {
    return <FullScreen><div className="badge badge-red">{error}</div></FullScreen>;
  }
  if (!layouts || !active) {
    return <FullScreen><div className="tv-muted text-sm">Loading your designer…</div></FullScreen>;
  }

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      <header className="tv-panel border-b tv-divider flex items-center gap-2 px-3 sm:px-4 py-2 flex-shrink-0 safe-top">
        <div className="w-8 h-8 rounded tv-gold-bg flex items-center justify-center font-bold text-sm flex-shrink-0">TV</div>
        <div className="hidden sm:block mr-2">
          <div className="text-xs font-semibold tracking-wide leading-tight">TRIVISION</div>
          <div className="text-[9px] tv-muted uppercase tracking-wider">Studio Designer</div>
        </div>
        <div className="flex items-center gap-1 p-0.5 rounded-lg tv-panel-2 border tv-divider mr-1 flex-shrink-0">
          <button
            onClick={() => setView('designer')}
            className={classNames('px-2.5 py-1 text-xs rounded-md transition-colors', view === 'designer' ? 'tv-gold-bg font-medium' : 'tv-muted hover:text-white')}
          >Designer</button>
          <button
            onClick={() => setView('floorplan')}
            className={classNames('px-2.5 py-1 text-xs rounded-md transition-colors', view === 'floorplan' ? 'tv-gold-bg font-medium' : 'tv-muted hover:text-white')}
          >Floor Plan</button>
        </div>
        {view === 'designer' && (
          <>
            <select value={activeId} onChange={e => setActiveId(e.target.value)} className="text-xs max-w-[40vw] sm:max-w-xs">
              {layouts.map(l => <option key={l.id} value={l.id}>{l.name} · {(DESIGNABLE_ROOMS.find(r => r.id === l.spaceId) || {}).label || ('Studio ' + l.spaceId)}</option>)}
            </select>
            <button onClick={newLayout} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">New</button>
            <button onClick={() => editorUndo.current && editorUndo.current()} disabled={!canUndo} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)] disabled:opacity-40 disabled:cursor-not-allowed">↶ Undo</button>
            <button onClick={deleteLayout} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-red-400 hover:text-red-300">Delete</button>
          </>
        )}
        <div className="ml-auto flex items-center gap-2 sm:gap-3">
          {view === 'designer' && active && (
            <>
              {floorApproved && <span className="badge badge-green">✓ Approved</span>}
              <SaveStatus status={status} />
              <button onClick={approve} disabled={approving} className="px-3 py-1.5 text-xs rounded tv-gold-bg font-medium disabled:opacity-60">
                {approving ? 'Sending…' : (floorApproved ? 'Re-approve floor plan' : 'Approve floor plan')}
              </button>
            </>
          )}
          <span className="hidden md:inline text-xs tv-muted">{user.displayName}</span>
          <button onClick={onLogout} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Sign out</button>
        </div>
      </header>
      <div className="flex-1 flex flex-col overflow-hidden min-h-0">
        {view === 'designer' ? (
          <div className="flex-1 flex flex-col min-h-0">
            {floorApproved && (
              <div className="px-4 py-2 text-xs flex items-center gap-2 flex-shrink-0" style={{ background: 'rgba(34,197,94,0.12)', borderBottom: '1px solid rgba(34,197,94,0.3)', color: '#86efac' }}>
                <span>✓ Your floor plan is approved and sent to TriVision. You can still make changes — re-approve to send updates.</span>
              </div>
            )}
            <div className="flex-1 min-h-0 flex flex-col">
              <LayoutEditor key={active.id} layout={active} isMobile={isMobile} onSaved={patchInList} onStatus={setStatus} readOnly={false} flushRef={editorFlush} undoRef={editorUndo} onUndoState={setCanUndo} />
            </div>
          </div>
        ) : (
          <div className="flex-1 flex flex-col min-h-0 p-3 md:p-5">
            <div className="mb-3">
              <h1 className="text-lg md:text-xl font-semibold">Studio Floor Plan</h1>
              <p className="text-xs tv-muted">Explore the whole TriVision Event Center in 3D — orbit, free-roam, or click any room to design it.</p>
            </div>
            <div className="flex-1 tv-panel border tv-divider rounded-lg overflow-hidden min-h-0">
              <BuildingView isMobile={isMobile} onOpenSpace={openSpace} activeProject={floorProject} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const CLIENT_STATUS_BADGE = {
  draft: { label: 'Draft', cls: 'badge-muted' },
  pending: { label: 'Awaiting approval', cls: 'badge-gold' },
  approved: { label: '✓ Approved', cls: 'badge-green' },

function AdminClients({ isMobile }) {
  const [layouts, setLayouts] = useState(null);
  const [editing, setEditing] = useState(null);
  const [viewingOwner, setViewingOwner] = useState(null);
  const [status, setStatus] = useState('saved');
  const [error, setError] = useState(null);
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState('');
  const [newSpace, setNewSpace] = useState('A');
  const [busy, setBusy] = useState(false);
  const [toast, setToast] = useState(null);

  const reload = async () => {
    try {
      const list = await api.listLayouts();
      setLayouts(list);
    } catch (e) { setError(e.message || 'Could not load layouts.'); }
  };
  useEffect(() => { reload(); }, []);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2800); };

  const patchInList = (updated) => {
    setLayouts(prev => prev ? prev.map(l => l.id === updated.id ? updated : l) : prev);
    setEditing(prev => prev && prev.id === updated.id ? updated : prev);
  };

  // Group every layout by the client who owns it, so the admin can review one
  // client's whole submission (all the spaces they touched) together.
  const byOwner = useMemo(() => {
    const groups = new Map();
    (layouts || []).forEach(l => {
      const id = l.owner ? l.owner.id : 'unknown';
      if (!groups.has(id)) groups.set(id, { owner: l.owner, layouts: [] });
      groups.get(id).layouts.push(l);
    });
    return Array.from(groups.values());
  }, [layouts]);

  // The client whose combined floor plan is open, plus a synthetic project that
  // merges all their spaces into the one read-only 3D building view.
  const viewingGroup = viewingOwner ? byOwner.find(g => (g.owner ? g.owner.id : 'unknown') === viewingOwner) : null;
  const viewingProject = useMemo(() => {
    if (!viewingGroup) return null;
    const bySpace = {};
    viewingGroup.layouts.forEach(l => { bySpace[l.spaceId] = Array.isArray(l.data) ? l.data : []; });
    return { id: 'client-' + viewingOwner, name: viewingGroup.owner ? viewingGroup.owner.displayName : 'Client', layouts: bySpace };
  }, [viewingGroup, viewingOwner]);

  const createClient = async () => {
    const dn = newName.trim();
    if (!dn) return;
    setBusy(true);
    try {
      const { layout } = await api.createClientLayout({ displayName: dn, name: dn + "'s Layout", spaceId: newSpace });
      setLayouts(prev => [layout, ...(prev || [])]);
      setCreating(false); setNewName(''); setNewSpace('A');
      setStatus('saved'); setEditing(layout); // jump straight into designing for them
    } catch (e) { window.alert(e.message); }
    finally { setBusy(false); }
  };

  const copyLink = async (l) => {
    try {
      const { path } = await api.getInvite(l.id);
      const url = window.location.origin + path;
      let copied = false;
      try { await navigator.clipboard.writeText(url); copied = true; } catch (e) {}
      if (copied) flash('Review link copied — paste it to your client');
      else window.prompt('Copy this review link and send it to your client:', url);
      // Reflect the draft -> pending transition the server just made.
      setLayouts(prev => prev ? prev.map(x => x.id === l.id ? { ...x, status: x.status === 'draft' ? 'pending' : x.status } : x) : prev);
    } catch (e) { window.alert(e.message); }
  };

  const reopenLayout = async (l) => {
    if (!window.confirm(`Reopen "${l.name}" so the client can edit again?`)) return;
    try { patchInList(await api.reopenLayout(l.id)); }
    catch (e) { window.alert(e.message); }
  };

  const removeLayout = async (l) => {
    if (!window.confirm(`Delete "${l.name}" by ${l.owner ? l.owner.displayName : 'unknown'}?`)) return;
    try {
      await api.deleteLayout(l.id);
      setLayouts(prev => prev.filter(x => x.id !== l.id));
    } catch (e) { window.alert(e.message); }
  };

  if (viewingProject) {
    const g = viewingGroup;
    const approvedCount = g.layouts.filter(l => l.status === 'approved').length;
    return (
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="tv-panel border-b tv-divider flex items-center gap-3 px-4 py-2 flex-shrink-0">
          <button onClick={() => setViewingOwner(null)} className="px-3 py-1.5 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">← All client layouts</button>
          <div className="min-w-0">
            <div className="text-sm font-medium truncate">{g.owner ? g.owner.displayName : 'Client'} · Full floor plan</div>
            <div className="text-[11px] tv-muted truncate">{g.layouts.length} space{g.layouts.length === 1 ? '' : 's'}{approvedCount === g.layouts.length && approvedCount > 0 ? ' · ✓ Approved' : (approvedCount > 0 ? ` · ${approvedCount}/${g.layouts.length} approved` : '')}</div>
          </div>
        </div>
        <div className="flex-1 flex flex-col overflow-hidden min-h-0 p-3 md:p-5">
          <div className="flex-1 tv-panel border tv-divider rounded-lg overflow-hidden min-h-0">
            <BuildingView isMobile={isMobile} onOpenSpace={() => {}} activeProject={viewingProject} />
          </div>
        </div>
      </div>
    );
  }

  if (editing) {
    return (
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="tv-panel border-b tv-divider flex items-center gap-3 px-4 py-2 flex-shrink-0">
          <button onClick={() => setEditing(null)} className="px-3 py-1.5 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">← All client layouts</button>
          <div className="min-w-0">
            <div className="text-sm font-medium truncate">{editing.name}</div>
            <div className="text-[11px] tv-muted truncate">{editing.owner ? editing.owner.displayName + ' · ' : ''}Studio {editing.spaceId}{editing.status === 'approved' ? ' · ✓ Approved' : ''}</div>
          </div>
          <div className="ml-auto"><SaveStatus status={status} /></div>
        </div>
        <div className="flex-1 flex flex-col overflow-hidden min-h-0">
          <LayoutEditor layout={editing} isMobile={isMobile} onSaved={patchInList} onStatus={setStatus} />
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <TopBar title="Client Layouts" subtitle="Design a layout for a client, then send them a link to review & approve it." />
      <div className="flex-1 overflow-auto scroll-thin p-4 sm:p-8">
        {error && <div className="badge badge-red mb-4">{error}</div>}

        <div className="mb-5">
          {!creating ? (
            <button onClick={() => setCreating(true)} className="px-3.5 py-2 text-sm tv-gold-bg font-medium rounded">+ New client layout</button>
          ) : (
            <div className="tv-panel rounded-lg border p-4 max-w-xl">
              <div className="text-sm font-medium mb-3">New client layout</div>
              <div className="grid gap-3 sm:grid-cols-2">
                <div>
                  <label className="text-[10px] tv-muted uppercase tracking-wider">Client name</label>
                  <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Jane from Acme Co." className="w-full mt-1"
                    onKeyDown={e => { if (e.key === 'Enter') createClient(); }} autoFocus />
                </div>
                <div>
                  <label className="text-[10px] tv-muted uppercase tracking-wider">Studio / room</label>
                  <select value={newSpace} onChange={e => setNewSpace(e.target.value)} className="w-full mt-1">
                    {DESIGNABLE_ROOMS.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="flex gap-2 mt-4">
                <button onClick={createClient} disabled={busy || !newName.trim()} className="px-3.5 py-2 text-sm tv-gold-bg font-medium rounded disabled:opacity-60">
                  {busy ? 'Creating…' : 'Create & design'}
                </button>
                <button onClick={() => { setCreating(false); setNewName(''); }} className="px-3.5 py-2 text-sm rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Cancel</button>
              </div>
              <div className="text-[11px] tv-muted mt-3">Creates a private account for the client. You design the layout, then "Copy review link" to send them a one-click sign-in.</div>
            </div>
          )}
        </div>

        {!layouts && <div className="tv-muted text-sm">Loading…</div>}
        {layouts && layouts.length === 0 && (
          <div className="tv-muted text-sm">No client layouts yet. Click “+ New client layout” to design one and send a review link.</div>
        )}
        {layouts && layouts.length > 0 && (
          <div className="flex flex-col gap-6">
            {byOwner.map(group => {
              const ownerId = group.owner ? group.owner.id : 'unknown';
              const ownerName = group.owner ? group.owner.displayName : 'Unknown owner';
              const allApproved = group.layouts.length > 0 && group.layouts.every(l => l.status === 'approved');
              return (
              <div key={ownerId}>
                <div className="flex items-center gap-3 mb-3">
                  <h2 className="text-sm font-semibold">{ownerName}</h2>
                  {allApproved && <span className="badge badge-green">✓ Floor plan approved</span>}
                  <span className="text-[11px] tv-muted">{group.layouts.length} space{group.layouts.length === 1 ? '' : 's'}</span>
                  <button onClick={() => setViewingOwner(ownerId)} className="ml-auto px-3 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">View full floor plan</button>
                </div>
                <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                  {group.layouts.map(l => {
                    const sb = CLIENT_STATUS_BADGE[l.status] || CLIENT_STATUS_BADGE.draft;
                    return (
                    <div key={l.id} className="tv-panel rounded-lg border p-4 flex flex-col">
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <div className="font-medium text-sm truncate">{l.name}</div>
                          <div className="text-xs tv-muted truncate">{(DESIGNABLE_ROOMS.find(r => r.id === l.spaceId) || {}).label || ('Studio ' + l.spaceId)}</div>
                        </div>
                        <span className="badge badge-gold flex-shrink-0">Studio {l.spaceId}</span>
                      </div>
                      <div className="flex items-center gap-2 mt-3">
                        <span className={classNames('badge', sb.cls)}>{sb.label}</span>
                        <span className="text-[11px] tv-muted">{(Array.isArray(l.data) ? l.data.length : 0)} items · {new Date(l.updatedAt).toLocaleDateString()}</span>
                      </div>
                      <div className="flex flex-wrap gap-2 mt-4">
                        <button onClick={() => { setStatus('saved'); setEditing(l); }} className="flex-1 min-w-[64px] px-3 py-1.5 text-xs tv-gold-bg font-medium rounded">Open</button>
                        <button onClick={() => copyLink(l)} className="px-3 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Copy review link</button>
                        {l.status === 'approved' && (
                          <button onClick={() => reopenLayout(l)} className="px-3 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">Reopen</button>
                        )}
                        <button onClick={() => removeLayout(l)} className="px-3 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-red-400 hover:text-red-300">Delete</button>
                      </div>
                    </div>
                    );
                  })}
                </div>
              </div>
              );
            })}
          </div>
        )}
      </div>
      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg tv-gold-bg text-sm font-medium shadow-lg">{toast}</div>
      )}
    </div>
  );
}

// ============================================================
// AUTH GATE — decides what to render based on the signed-in user
// ============================================================
function AuthGate() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = signed out
  const [venueReady, setVenueReady] = useState(false);

  // A magic invite link lands on /?layout=<id>. Capture it once, then strip it
  // from the URL so refreshes stay clean.
  const deepLinkLayoutId = useMemo(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('layout');
      if (params.get('layout') || params.get('invite')) {
        const u = new URL(window.location.href);
        u.searchParams.delete('layout');
        u.searchParams.delete('invite');
        window.history.replaceState({}, '', u.pathname + u.search + u.hash);
      }
      return id || null;
    } catch (e) { return null; }
  }, []);

  useEffect(() => {
    api.me().then(setUser).catch(() => setUser(null));
  }, []);

  // Once signed in, load the saved venue structure and apply it so the floor
  // plan reflects any admin edits before we render.
  useEffect(() => {
    if (!user) { setVenueReady(true); return; }
    let done = false;
    api.getVenue()
      .then(res => applyVenueOverrides(res && res.data))
      .catch(() => {})
      .finally(() => { if (!done) setVenueReady(true); });
    return () => { done = true; };
  }, [user]);

  const onAuthed = (u) => { setVenueReady(false); setUser(u); };
  const logout = async () => {
    try { await api.logout(); } catch (e) {}
    setUser(null);
  };

  if (user === undefined) return <FullScreen><div className="tv-muted text-sm">Loading…</div></FullScreen>;
  if (!user) return <LoginScreen onAuthed={onAuthed} />;
  if (!venueReady) return <FullScreen><div className="tv-muted text-sm">Loading…</div></FullScreen>;
  if (user.role === 'admin') return <App user={user} onLogout={logout} />;
  return <GuestApp user={user} onLogout={logout} initialLayoutId={deepLinkLayoutId} />;
}

// ============================================================
// APP
// ============================================================

function App({ user, onLogout }) {
  const [view, setView] = useState('dashboard');
  const [venueVersion, setVenueVersion] = useState(0); // bumped to remount the 3D plan after edits
  const [events, setEvents] = useState([]);
  useEffect(() => { api.listEvents().then(setEvents).catch(() => {}); }, []);
  const addEvent = (e) => setEvents(prev => [...prev, e].sort((a, b) => (a.date || '').localeCompare(b.date || '')));
  const setEventArchived = async (e, archived) => {
    try {
      const updated = await api.archiveEvent(e.id, archived);
      setEvents(prev => prev.map(x => x.id === updated.id ? updated : x));
    } catch (err) { flashEventNote(err.message || 'Could not update the event.'); }
  };
  const removeEvent = async (e) => {
    if (!window.confirm('Delete "' + e.name + '" permanently? This cannot be undone.')) return;
    try {
      await api.deleteEvent(e.id);
      setEvents(prev => prev.filter(x => x.id !== e.id));
    } catch (err) { flashEventNote(err.message || 'Could not delete the event.'); }
  };
  const [currentEvent, setCurrentEvent] = useState(null);
  const [openLayout, setOpenLayout] = useState(null);       // the client layout tied to the event being viewed
  const [eventLayoutStatus, setEventLayoutStatus] = useState('saved');
  const [eventNote, setEventNote] = useState(null);         // transient toast (e.g. event has no layout)
  const [drawerOpen, setDrawerOpen] = useState(false);
  const isMobile = useIsMobile();

  const flashEventNote = (msg) => { setEventNote(msg); setTimeout(() => setEventNote(null), 2600); };

  // ---- Whole-building projects (persisted) ----
  const [projects, setProjects] = useState(loadProjects);
  const [activeProjectId, setActiveProjectId] = useState(loadActiveProjectId);
  useEffect(() => { persistProjects(projects); }, [projects]);
  useEffect(() => { persistActiveProjectId(activeProjectId); }, [activeProjectId]);
  const activeProject = projects.find(p => p.id === activeProjectId) || null;

  const createProject = (name) => {
    const p = { id: 'proj-' + Date.now(), name: name || 'Untitled Project', createdAt: Date.now(), updatedAt: Date.now(), layouts: {} };
    setProjects(prev => [...prev, p]);
    setActiveProjectId(p.id);
    return p;
  };
  const deleteProject = (id) => {
    setProjects(prev => prev.filter(p => p.id !== id));
    setActiveProjectId(prev => (prev === id ? null : prev));
  };
  const renameProject = (id, name) => {
    setProjects(prev => prev.map(p => p.id === id ? { ...p, name, updatedAt: Date.now() } : p));
  };
  const updateRoomLayout = (roomId, layoutItems) => {
    setProjects(prev => prev.map(p => p.id === activeProjectId
      ? { ...p, updatedAt: Date.now(), layouts: { ...p.layouts, [roomId]: layoutItems } }
      : p));
  };

  // Clicking an event opens the EXACT client layout chosen for it, fully editable.
  // Events with no layout just flash a note (there's nothing to open).
  const openEvent = async (e) => {
    if (!e.layoutId) {
      flashEventNote('No layout is linked to this event.');
      return;
    }
    try {
      const list = await api.listLayouts();
      const layout = list.find(l => l.id === e.layoutId);
      if (!layout) {
        flashEventNote('That layout no longer exists.');
        return;
      }
      setCurrentEvent(e);
      setOpenLayout(layout);
      setEventLayoutStatus('saved');
      setView('eventlayout');
    } catch (err) {
      flashEventNote(err.message || 'Could not open the layout.');
    }
  };

  const newEvent = () => {
    setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    setView('designer');
  };

  const handleNav = (v) => {
    setView(v);
    if (v === 'designer' && !currentEvent) {
      setCurrentEvent({ name: 'New Event', client: '', guests: 200, space: 'A', preset: null });
    }
  };

  // Open a room for design from the floor plan — always inside the active project
  // (auto-create one if none exists so placed furniture is saved & shown on the plan).
  const openSpace = (spaceId) => {
    let proj = activeProject;
    if (!proj) proj = createProject('My Event');
    setCurrentEvent({ name: proj.name, client: '', guests: 200, space: spaceId, preset: null, projectId: proj.id });
    setView('designer');
  };

  const VIEW_LABELS = {
    dashboard: 'Dashboard',
    floorplan: 'Floor Plan',
    venue: 'Venue Layout',
    designer: 'Layout Designer',
    clients: 'Client Layouts',
    events: 'Events',
    eventlayout: 'Event Layout',
    inventory: 'Inventory',
    reports: 'Reports',
  };

  return (
    <div className="flex h-screen overflow-hidden">
      {eventNote && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-4 py-2.5 rounded-lg text-sm tv-panel border tv-divider shadow-xl">{eventNote}</div>
      )}

      {/* Desktop: persistent sidebar */}
      {!isMobile && <Sidebar active={view} onNav={handleNav} isMobile={false} user={user} onLogout={onLogout} />}

      {/* Mobile: slide-over drawer */}
      {isMobile && drawerOpen && (
        <div className="fixed inset-0 z-40 flex">
          <div className="backdrop absolute inset-0" onClick={() => setDrawerOpen(false)} />
          <div className="relative z-50 drawer-shown" style={{ animation: 'none' }}>
            <Sidebar active={view} onNav={handleNav} isMobile={true} onClose={() => setDrawerOpen(false)} user={user} onLogout={onLogout} />
          </div>
        </div>
      )}

      <main className="flex-1 flex flex-col overflow-hidden min-w-0">
        {isMobile && (
          <MobileTopBar
            onMenu={() => setDrawerOpen(true)}
            title={VIEW_LABELS[view]}
          />
        )}
        <div className="flex-1 flex flex-col overflow-hidden min-h-0">
          {view === 'dashboard' && <Dashboard events={events.filter(e => !e.archived)} onOpenEvent={openEvent} onNewEvent={newEvent} onNav={setView} isMobile={isMobile} />}
          {view === 'floorplan' && (
            <FloorPlanScreen
              key={venueVersion}
              isMobile={isMobile}
              onOpenSpace={openSpace}
              projects={projects}
              activeProject={activeProject}
              onCreateProject={createProject}
              onSelectProject={setActiveProjectId}
              onRenameProject={renameProject}
              onDeleteProject={deleteProject}
              editable
              onVenueSaved={() => setVenueVersion(v => v + 1)}
            />
          )}
          {view === 'venue' && (
            <FloorPlanScreen
              key={'venue-' + venueVersion}
              isMobile={isMobile}
              onOpenSpace={openSpace}
              projects={projects}
              activeProject={activeProject}
              onCreateProject={createProject}
              onSelectProject={setActiveProjectId}
              onRenameProject={renameProject}
              onDeleteProject={deleteProject}
              editable
              autoEdit
              onVenueSaved={() => setVenueVersion(v => v + 1)}
            />
          )}
          {view === 'designer' && (
            <Designer
              events={events}
              currentEvent={currentEvent}
              isMobile={isMobile}
              activeProject={activeProject}
              onUpdateRoomLayout={updateRoomLayout}
              onBackToFloorPlan={() => setView('floorplan')}
            />
          )}
          {view === 'clients' && <AdminClients isMobile={isMobile} />}
          {view === 'events' && <EventsScreen events={events} onOpenEvent={openEvent} onCreated={addEvent} onArchive={setEventArchived} onDelete={removeEvent} isMobile={isMobile} />}
          {view === 'eventlayout' && openLayout && (
            <div className="flex-1 flex flex-col min-h-0">
              <div className="flex items-center gap-3 px-4 py-3 border-b tv-divider flex-shrink-0">
                <button onClick={() => { setView('events'); setOpenLayout(null); }} className="px-2.5 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]">← Events</button>
                <div className="min-w-0">
                  <div className="font-medium truncate">{currentEvent ? currentEvent.name : openLayout.name}</div>
                  <div className="text-xs tv-muted truncate">
                    {openLayout.name} · {(DESIGNABLE_ROOMS.find(r => r.id === openLayout.spaceId) || {}).label || ('Studio ' + openLayout.spaceId)}
                    {openLayout.owner ? ' · ' + openLayout.owner.displayName : ''}
                  </div>
                </div>
                <div className="ml-auto"><SaveStatus status={eventLayoutStatus} /></div>
              </div>
              <div className="flex-1 min-h-0 flex flex-col">
                <LayoutEditor key={openLayout.id} layout={openLayout} isMobile={isMobile} onSaved={setOpenLayout} onStatus={setEventLayoutStatus} readOnly={false} />
              </div>
            </div>
          )}
          {view === 'inventory' && <Inventory isMobile={isMobile} />}
          {view === 'reports' && <Reports events={events.filter(e => !e.archived)} isMobile={isMobile} />}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthGate />);
</script>
</body>
</html>
