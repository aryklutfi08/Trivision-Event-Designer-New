// 3D helpers
// ----------------------------------------------------------

function hexToInt(c) {
  return parseInt(c.replace('#', ''), 16);
}

function updateOrbitCamera(camera, orbit) {
  const x = orbit.distance * Math.sin(orbit.polar) * Math.cos(orbit.azimuth);
  const y = orbit.distance * Math.cos(orbit.polar);
  const z = orbit.distance * Math.sin(orbit.polar) * Math.sin(orbit.azimuth);
  camera.position.set(
    orbit.target.x + x,
    orbit.target.y + y,
    orbit.target.z + z
  );
  camera.lookAt(orbit.target);
}

function buildFurnitureMesh(item, f, isSelected) {
  const group = new THREE.Group();
  group.userData.itemId = item.id;
  group.userData.isItem = true;

  const baseColor = hexToInt(f.color);
  const makeMat = (overrides = {}) =>
    new THREE.MeshStandardMaterial(Object.assign(
      { color: baseColor, roughness: 0.65, metalness: 0.1 },
      isSelected ? { emissive: 0xc8a96a, emissiveIntensity: 0.45 } : {},
      overrides
    ));

  // Geometry is always built in its natural orientation; visible rotation is
  // applied at the end via group.rotation.y so chairs, tables, and lounges all
  // physically spin around their own center.
  if (f.type === 'chair') {
    // Seat
    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.18, 1.3), makeMat());
    seat.position.y = 1.4;
    seat.castShadow = true;
    seat.receiveShadow = true;
    group.add(seat);
    // Back — placed on +z side so chair "faces" -z (toward stage in our coord system)
    const back = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.8, 0.18), makeMat());
    back.position.set(0, 2.3, 0.56);
    back.castShadow = true;
    group.add(back);
    // 4 legs
    for (let i = -1; i <= 1; i += 2) {
      for (let j = -1; j <= 1; j += 2) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.4, 0.12), makeMat({ color: 0x2a2f3d }));
        leg.position.set(i * 0.55, 0.7, j * 0.55);
        leg.castShadow = true;
        group.add(leg);
      }
    }
  } else if (f.type === 'table' && f.shape === 'circle') {
    const r = f.diameter / 2;
    const tableMat = makeMat({ color: 0xffffff, roughness: 0.3 });
    const top = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.18, 36), tableMat);
    top.position.y = 2.5;
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);
    // Linen drape — slightly larger, semi-transparent
    const drape = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, 2.4, 36, 1, true),
      new THREE.MeshStandardMaterial({ color: 0xf5f1ea, side: THREE.DoubleSide, roughness: 0.9 })
    );
    drape.position.y = 1.2;
    group.add(drape);
    // Pedestal
    const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 2.4, 16), makeMat({ color: 0x2a2f3d }));
    pedestal.position.y = 1.2;
    group.add(pedestal);
    // Base
    const base = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.4, r * 0.45, 0.12, 24), makeMat({ color: 0x2a2f3d }));
    base.position.y = 0.06;
    base.receiveShadow = true;
    group.add(base);
    // Cocktail table tweak — taller and thinner
    if (f.id === 'cocktail') {
      top.position.y = 3.6;
      drape.position.y = 1.8;
      drape.geometry.dispose();
      drape.geometry = new THREE.CylinderGeometry(r, r * 0.7, 3.6, 24, 1, true);
      pedestal.position.y = 1.8;
      pedestal.geometry.dispose();
      pedestal.geometry = new THREE.CylinderGeometry(0.2, 0.2, 3.6, 16);
    }
  } else if (f.type === 'table' && f.shape === 'rect') {
    const w = f.w;
    const d = f.h;
    const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.18, d), makeMat({ color: 0xeae4d6, roughness: 0.4 }));
    top.position.y = 2.5;
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);
    // Legs at corners
    const legMat = makeMat({ color: 0x2a2f3d });
    for (let i = -1; i <= 1; i += 2) {
      for (let j = -1; j <= 1; j += 2) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.4, 0.18), legMat);
        leg.position.set(i * (w / 2 - 0.15), 1.2, j * (d / 2 - 0.15));
        leg.castShadow = true;
        group.add(leg);
      }
    }
  } else if (f.type === 'lounge') {
    const w = f.w;
    const d = f.h;
    const cushMat = makeMat({ roughness: 0.85 });
    // Base
    const base = new THREE.Mesh(new THREE.BoxGeometry(w, 1.3, d), cushMat);
    base.position.y = 0.65;
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);
    // Back
    const back = new THREE.Mesh(new THREE.BoxGeometry(w, 1.6, 0.5), cushMat);
    back.position.set(0, 1.9, d / 2 - 0.25);
    back.castShadow = true;
    group.add(back);
    // Arms
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, d), cushMat);
    armL.position.set(-w / 2 + 0.2, 1.8, 0);
    group.add(armL);
    const armR = armL.clone();
    armR.position.x = w / 2 - 0.2;
    group.add(armR);
  } else if (f.id === 'podium') {
    const w = f.w;
    const d = f.h;
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(w, 4, d),
      makeMat({ color: 0xc8a96a, roughness: 0.3, metalness: 0.55 })
    );
    body.position.y = 2;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);
    // Angled top reading surface
    const slope = new THREE.Mesh(
      new THREE.BoxGeometry(w * 0.95, 0.1, d * 0.7),
      makeMat({ color: 0x6b4f2a })
    );
    slope.position.set(0, 4.1, 0.15);
    slope.rotation.x = -0.25;
    group.add(slope);
  } else if (f.id === 'stage-deck') {
    const w = f.w;
    const d = f.h;
    const deck = new THREE.Mesh(new THREE.BoxGeometry(w, 1.5, d), makeMat({ color: 0x1c1419 }));
    deck.position.y = 0.75;
    deck.castShadow = true;
    deck.receiveShadow = true;
    group.add(deck);
    const trim = new THREE.Mesh(
      new THREE.BoxGeometry(w + 0.05, 0.1, d + 0.05),
      makeMat({ color: 0xc8a96a, metalness: 0.6, roughness: 0.3 })
    );
    trim.position.y = 1.5;
    group.add(trim);
  } else if (f.type === 'drape') {
    // A hanging fabric panel along its long (x) axis. Length is variable and
    // lives on the item; from above it reads as a thin line.
    const L = item.lengthFt || f.length || 10;
    const H = 8; // pipe-and-drape height (ft)
    const fabric = new THREE.Mesh(
      new THREE.BoxGeometry(L, H, DRAPE_THICK),
      new THREE.MeshStandardMaterial({ color: baseColor, roughness: 0.95, metalness: 0, side: THREE.DoubleSide })
    );
    fabric.position.y = H / 2;
    fabric.castShadow = true;
    fabric.receiveShadow = true;
    group.add(fabric);
    // Top rod + end posts (the "pipe" of pipe-and-drape).
    const pipeMat = makeMat({ color: 0x2a2f3d, metalness: 0.5, roughness: 0.4 });
    const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, L, 12), pipeMat);
    rod.rotation.z = Math.PI / 2;
    rod.position.y = H;
    group.add(rod);
    for (const sx of [-L / 2, L / 2]) {
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, H, 12), pipeMat);
      post.position.set(sx, H / 2, 0);
      group.add(post);
    }
    // Grab-handles at each end (only while selected). Drag an end to stretch /
    // shrink and swing the drape; tagged so the canvas can hit-test them.
    if (isSelected) {
      const handleMat = new THREE.MeshStandardMaterial({ color: 0xc8a96a, emissive: 0xc8a96a, emissiveIntensity: 0.6, roughness: 0.4 });
      const ends = [{ end: 'A', x: -L / 2 }, { end: 'B', x: L / 2 }];
      for (const e of ends) {
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.7, 18, 14), handleMat);
        knob.position.set(e.x, H / 2, 0);
        knob.userData.isHandle = true;
        knob.userData.handleEnd = e.end;
        knob.userData.itemId = item.id;
        group.add(knob);
      }
    }
  } else {
    const w = f.w || 1;
    const d = f.h || 1;
    const box = new THREE.Mesh(new THREE.BoxGeometry(w, 2, d), makeMat());
    box.position.y = 1;
    box.castShadow = true;
    group.add(box);
  }

  // Apply visible rotation so chairs / tables / lounges spin around their center.
  // Negative so rotation === 90 matches a clockwise 2D rotation when viewed from above.
  if (item.rotation) {
    group.rotation.y = -((item.rotation || 0) * Math.PI) / 180;
  }

  return group;
}

function disposeGroup(group) {
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
}

function FloorPlanCanvas({ space, items, onMove, onMoveGroup, onSelect, selectedIds, onDeselect, onResizeDrape, isMobile }) {
  selectedIds = selectedIds || [];
  const containerRef = useRef(null);
  const stateRef = useRef({
    scene: null,
    camera: null,
    renderer: null,
    floor: null,
    itemGroup: null,
    raycaster: null,
    mouse: null,
    orbit: { azimuth: Math.PI / 2 + 0.4, polar: Math.PI / 3.2, distance: 90, target: new THREE.Vector3(0, 0, 0) },
    dragging: null,
    orbiting: null,
    animId: null,
    spaceMeta: null,
    callbacks: {},
    itemsCache: [],
  });

  // Keep latest callbacks/items inside stateRef so listeners stay valid
  stateRef.current.callbacks = { onMove, onMoveGroup, onSelect, onDeselect, onResizeDrape };
  stateRef.current.itemsCache = items;
  stateRef.current.selectedIds = selectedIds;

  // Build scene whenever the space (room) changes
  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;

    const width = container.clientWidth || 800;
    const height = container.clientHeight || 600;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c10);
    scene.fog = new THREE.Fog(0x0a0c10, 80, 260);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 600);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';
    renderer.domElement.style.borderRadius = '6px';

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xfff1d6, 0.85);
    keyLight.position.set(space.widthFt * 0.4, 60, space.depthFt * 0.4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    const shadowRange = Math.max(space.widthFt, space.depthFt);
    keyLight.shadow.camera.left = -shadowRange;
    keyLight.shadow.camera.right = shadowRange;
    keyLight.shadow.camera.top = shadowRange;
    keyLight.shadow.camera.bottom = -shadowRange;
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 200;
    scene.add(keyLight);

    const fill = new THREE.HemisphereLight(0xc8a96a, 0x0a0c10, 0.4);
    scene.add(fill);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(space.widthFt, space.depthFt);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x14171f,
      roughness: 0.85,
      metalness: 0.05,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    floor.userData.isFloor = true;
    scene.add(floor);

    // Floor grid overlay
    const gridSize = Math.max(space.widthFt, space.depthFt);
    const grid = new THREE.GridHelper(gridSize, gridSize, 0x2a2f3d, 0x1d212d);
    grid.material.opacity = 0.5;
    grid.material.transparent = true;
    grid.position.y = 0.02;
    scene.add(grid);

    // No perimeter walls — the room edits on an open floor canvas.

    // Fixtures (stage, doors)
    space.fixtures.forEach(f => {
      const cx = f.x + f.w / 2 - space.widthFt / 2;
      const cz = f.y + f.h / 2 - space.depthFt / 2;
      if (f.type === 'stage') {
        // Stage platform
        const stageMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.6, metalness: 0.2 });
        const platform = new THREE.Mesh(new THREE.BoxGeometry(f.w, 1.5, f.h), stageMat);
        platform.position.set(cx, 0.75, cz);
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);

        // Stage deck top (black to match the platform)
        const stageTrim = new THREE.Mesh(
          new THREE.BoxGeometry(f.w + 0.1, 0.08, f.h + 0.1),
          new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.5, metalness: 0.2 })
        );
        stageTrim.position.set(cx, 1.5, cz);
        scene.add(stageTrim);

        // LED video wall against back of stage
        const ledWidth = f.w;
        const ledHeight = 9;
        const led = new THREE.Mesh(
          new THREE.BoxGeometry(ledWidth, ledHeight, 0.4),
          new THREE.MeshStandardMaterial({
            color: 0x2a1218,
            emissive: 0xb3253b,
            emissiveIntensity: 0.5,
            roughness: 0.4,
          })
        );
        const ledZ = f.y - space.depthFt / 2 + 0.2;
        led.position.set(cx, ledHeight / 2 + 1.5, ledZ);
        scene.add(led);

        // Screen glow (subtle plane in front of LED)
        const glow = new THREE.Mesh(
          new THREE.PlaneGeometry(ledWidth - 0.4, ledHeight - 0.8),
          new THREE.MeshBasicMaterial({ color: 0xff6a85, transparent: true, opacity: 0.25 })
        );
        glow.position.set(cx, ledHeight / 2 + 1.5, ledZ + 0.21);
        scene.add(glow);
      }
    });

    // Item group (added/removed when items change)
    const itemGroup = new THREE.Group();
    scene.add(itemGroup);

    // Initial camera
    const orbit = stateRef.current.orbit;
    orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.25;
    orbit.target.set(0, 2, 0);
    updateOrbitCamera(camera, orbit);

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    Object.assign(stateRef.current, { scene, camera, renderer, floor, itemGroup, raycaster, mouse });

    // ----- Event handling -----
    const dom = renderer.domElement;

    const getNDC = (e) => {
      const rect = dom.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    };

    const findItemHit = () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(itemGroup.children, true);
      for (const hit of hits) {
        let obj = hit.object;
        while (obj && !obj.userData.isItem) obj = obj.parent;
        if (obj) return obj.userData.itemId;
      }
      return null;
    };

    // A drape end-handle anywhere in the ray's path wins over the body, so the
    // ends always resize and the middle moves.
    const findHandleHit = () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(itemGroup.children, true);
      for (const hit of hits) {
        if (hit.object.userData.isHandle) {
          return { id: hit.object.userData.itemId, end: hit.object.userData.handleEnd };
        }
      }
      return null;
    };

    const floorPointFt = () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(floor, false);
      if (!hits.length) return null;
      const p = hits[0].point;
      return { fx: p.x + space.widthFt / 2, fy: p.z + space.depthFt / 2 };
    };

    const onMouseDown = (e) => {
      getNDC(e);
      if (e.button === 2) {
        stateRef.current.orbiting = { x: e.clientX, y: e.clientY };
        return;
      }
      const handle = findHandleHit();
      if (handle) {
        stateRef.current.draggingHandle = handle;
        e.preventDefault();
        return;
      }
      const id = findItemHit();
      if (id) {
        const additive = !!(e.shiftKey || e.metaKey || e.ctrlKey);
        stateRef.current.callbacks.onSelect(id, additive);
        if (!additive) {
          // Dragging a member of a multi-selection moves the whole group.
          const sel = stateRef.current.selectedIds || [];
          const ids = (sel.includes(id) && sel.length > 1) ? sel.slice() : [id];
          stateRef.current.dragging = { id, ids };
        }
        e.preventDefault();
        return;
      }
      // Empty click → orbit + deselect
      stateRef.current.orbiting = { x: e.clientX, y: e.clientY };
      stateRef.current.callbacks.onDeselect();
    };

    const onMouseMove = (e) => {
      if (stateRef.current.draggingHandle) {
        getNDC(e);
        const p = floorPointFt();
        if (p) stateRef.current.callbacks.onResizeDrape(stateRef.current.draggingHandle.id, stateRef.current.draggingHandle.end, p.fx, p.fy);
        return;
      }
      if (stateRef.current.dragging) {
        getNDC(e);
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(floor, false);
        if (hits.length > 0) {
          const p = hits[0].point;
          const xFt = p.x + space.widthFt / 2;
          const yFt = p.z + space.depthFt / 2;
          const drag = stateRef.current.dragging;
          const item = stateRef.current.itemsCache.find(it => it.id === drag.id);
          if (item) {
            const swap = item.rotation === 90 || item.rotation === 270;
            const dims = itemDims(item);
            const w = swap ? dims.h : dims.w;
            const h = swap ? dims.w : dims.h;
            const tx = xFt - w / 2, ty = yFt - h / 2;
            if (drag.ids && drag.ids.length > 1) {
              stateRef.current.callbacks.onMoveGroup(drag.ids, tx - item.xFt, ty - item.yFt);
            } else {
              stateRef.current.callbacks.onMove(drag.id, tx, ty);
            }
          }
        }
        return;
      }
      if (stateRef.current.orbiting) {
        const dx = e.clientX - stateRef.current.orbiting.x;
        const dy = e.clientY - stateRef.current.orbiting.y;
        stateRef.current.orbiting.x = e.clientX;
        stateRef.current.orbiting.y = e.clientY;
        orbit.azimuth -= dx * 0.008;
        orbit.polar -= dy * 0.008;
        // Allow nearly straight-down (aerial) and nearly horizon-level views.
        orbit.polar = Math.max(0.02, Math.min(Math.PI / 2 - 0.05, orbit.polar));
        updateOrbitCamera(camera, orbit);
      }
    };

    const onMouseUp = () => {
      stateRef.current.dragging = null;
      stateRef.current.orbiting = null;
      stateRef.current.draggingHandle = null;
    };

    const onWheel = (e) => {
      e.preventDefault();
      orbit.distance *= e.deltaY > 0 ? 1.05 : 0.95;
      orbit.distance = Math.max(20, Math.min(220, orbit.distance));
      updateOrbitCamera(camera, orbit);
    };

    const onContextMenu = (e) => e.preventDefault();

    const onResize = () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      if (w === 0 || h === 0) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };

    dom.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    dom.addEventListener('wheel', onWheel, { passive: false });
    dom.addEventListener('contextmenu', onContextMenu);
    window.addEventListener('resize', onResize);
    // Keep the canvas matched to its container even when it mounts before the
    // layout has settled (e.g. opening an approved layout for the first time):
    // the canvas would otherwise keep a stale size until a tab switch forced a
    // re-layout. The observer fires once on attach to correct the initial size.
    const ro = new ResizeObserver(onResize);
    ro.observe(container);

    // ====== TOUCH HANDLERS (mobile) ======
    // 1 finger: if it lands on an item, drag it. Otherwise orbit the camera.
    // 2 fingers: pinch to zoom + drag midpoint to orbit.
    const touchState = { mode: null, lastDist: 0, lastMid: null };
    const dist2 = (a, b) => {
      const dx = a.clientX - b.clientX;
      const dy = a.clientY - b.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    };
    const mid2 = (a, b) => ({ x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 });

    const onTouchStart = (e) => {
      if (e.touches.length === 1) {
        // Map first touch to NDC for picking
        const t = e.touches[0];
        const rect = dom.getBoundingClientRect();
        mouse.x = ((t.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((t.clientY - rect.top) / rect.height) * 2 + 1;
        const handle = findHandleHit();
        if (handle) {
          stateRef.current.draggingHandle = handle;
          touchState.mode = 'resize';
        } else {
          const id = findItemHit();
          if (id) {
            stateRef.current.callbacks.onSelect(id, false);
            const sel = stateRef.current.selectedIds || [];
            const ids = (sel.includes(id) && sel.length > 1) ? sel.slice() : [id];
            stateRef.current.dragging = { id, ids };
            touchState.mode = 'drag';
          } else {
            stateRef.current.callbacks.onDeselect();
            stateRef.current.orbiting = { x: t.clientX, y: t.clientY };
            touchState.mode = 'orbit';
          }
        }
        e.preventDefault();
      } else if (e.touches.length === 2) {
        // Two-finger gesture: pinch + orbit
        stateRef.current.dragging = null;
        stateRef.current.orbiting = null;
        touchState.mode = 'pinch';
        touchState.lastDist = dist2(e.touches[0], e.touches[1]);
        touchState.lastMid = mid2(e.touches[0], e.touches[1]);
        e.preventDefault();
      }
    };

    const onTouchMove = (e) => {
      if (touchState.mode === 'resize' && e.touches.length === 1 && stateRef.current.draggingHandle) {
        const t = e.touches[0];
        const rect = dom.getBoundingClientRect();
        mouse.x = ((t.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((t.clientY - rect.top) / rect.height) * 2 + 1;
        const p = floorPointFt();
        if (p) stateRef.current.callbacks.onResizeDrape(stateRef.current.draggingHandle.id, stateRef.current.draggingHandle.end, p.fx, p.fy);
        e.preventDefault();
        return;
      }
      if (touchState.mode === 'drag' && e.touches.length === 1) {
        const t = e.touches[0];
        const rect = dom.getBoundingClientRect();
        mouse.x = ((t.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((t.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(floor, false);
        if (hits.length > 0 && stateRef.current.dragging) {
          const p = hits[0].point;
          const xFt = p.x + space.widthFt / 2;
          const yFt = p.z + space.depthFt / 2;
          const drag = stateRef.current.dragging;
          const item = stateRef.current.itemsCache.find(it => it.id === drag.id);
          if (item) {
            const swap = item.rotation === 90 || item.rotation === 270;
            const dims = itemDims(item);
            const w = swap ? dims.h : dims.w;
            const h = swap ? dims.w : dims.h;
            const tx = xFt - w / 2, ty = yFt - h / 2;
            if (drag.ids && drag.ids.length > 1) {
              stateRef.current.callbacks.onMoveGroup(drag.ids, tx - item.xFt, ty - item.yFt);
            } else {
              stateRef.current.callbacks.onMove(drag.id, tx, ty);
            }
          }
        }
        e.preventDefault();
      } else if (touchState.mode === 'orbit' && e.touches.length === 1) {
        const t = e.touches[0];
        if (stateRef.current.orbiting) {
          const dx = t.clientX - stateRef.current.orbiting.x;
          const dy = t.clientY - stateRef.current.orbiting.y;
          stateRef.current.orbiting.x = t.clientX;
          stateRef.current.orbiting.y = t.clientY;
          orbit.azimuth -= dx * 0.008;
          orbit.polar -= dy * 0.008;
          orbit.polar = Math.max(0.02, Math.min(Math.PI / 2 - 0.05, orbit.polar));
          updateOrbitCamera(camera, orbit);
        }
        e.preventDefault();
      } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
        const newDist = dist2(e.touches[0], e.touches[1]);
        const newMid = mid2(e.touches[0], e.touches[1]);
        if (touchState.lastDist > 0) {
          const ratio = touchState.lastDist / newDist;
          orbit.distance *= ratio;
          orbit.distance = Math.max(20, Math.min(220, orbit.distance));
        }
        // Two-finger drag also orbits
        if (touchState.lastMid) {
          const dx = newMid.x - touchState.lastMid.x;
          const dy = newMid.y - touchState.lastMid.y;
          orbit.azimuth -= dx * 0.008;
          orbit.polar -= dy * 0.008;
          orbit.polar = Math.max(0.02, Math.min(Math.PI / 2 - 0.05, orbit.polar));
        }
        touchState.lastDist = newDist;
        touchState.lastMid = newMid;
        updateOrbitCamera(camera, orbit);
        e.preventDefault();
      }
    };

    const onTouchEnd = (e) => {
      if (e.touches.length === 0) {
        stateRef.current.dragging = null;
        stateRef.current.orbiting = null;
        stateRef.current.draggingHandle = null;
        touchState.mode = null;
        touchState.lastDist = 0;
        touchState.lastMid = null;
      } else if (e.touches.length === 1 && touchState.mode === 'pinch') {
        // Transition from pinch to single-finger orbit
        const t = e.touches[0];
        touchState.mode = 'orbit';
        stateRef.current.orbiting = { x: t.clientX, y: t.clientY };
        touchState.lastDist = 0;
        touchState.lastMid = null;
      }
    };

    dom.addEventListener('touchstart', onTouchStart, { passive: false });
    dom.addEventListener('touchmove', onTouchMove, { passive: false });
    dom.addEventListener('touchend', onTouchEnd);
    dom.addEventListener('touchcancel', onTouchEnd);

    // Animation loop
    const animate = () => {
      stateRef.current.animId = requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(stateRef.current.animId);
      dom.removeEventListener('mousedown', onMouseDown);
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      dom.removeEventListener('wheel', onWheel);
      dom.removeEventListener('contextmenu', onContextMenu);
      window.removeEventListener('resize', onResize);
      ro.disconnect();
      dom.removeEventListener('touchstart', onTouchStart);
      dom.removeEventListener('touchmove', onTouchMove);
      dom.removeEventListener('touchend', onTouchEnd);
      dom.removeEventListener('touchcancel', onTouchEnd);
      scene.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
      renderer.dispose();
      if (dom.parentNode) dom.parentNode.removeChild(dom);
    };
    // eslint-disable-next-line
  }, [space.id]);

  // Rebuild item meshes whenever items or selection change
  useEffect(() => {
    const itemGroup = stateRef.current.itemGroup;
    if (!itemGroup) return;
    // Remove old
    while (itemGroup.children.length > 0) {
      const child = itemGroup.children[0];
      itemGroup.remove(child);
      disposeGroup(child);
    }
    // Height of the stage platform top, so items dropped onto the stage sit on
    // it rather than vanishing underneath the 1.5ft-tall deck.
    const STAGE_TOP = 1.5;
    const stageElevation = (cxFt, cyFt) => {
      for (const fx of space.fixtures) {
        if (fx.type !== 'stage') continue;
        if (cxFt >= fx.x && cxFt <= fx.x + fx.w && cyFt >= fx.y && cyFt <= fx.y + fx.h) return STAGE_TOP;
      }
      return 0;
    };
    // Add fresh
    items.forEach(item => {
      const f = FURN_BY_ID[item.furnId];
      if (!f) return;
      const mesh = buildFurnitureMesh(item, f, selectedIds.includes(item.id));
      const swap = item.rotation === 90 || item.rotation === 270;
      const dims = itemDims(item);
      const sizeW = swap ? dims.h : dims.w;
      const sizeD = swap ? dims.w : dims.h;
      const cxFt = item.xFt + sizeW / 2;
      const cyFt = item.yFt + sizeD / 2;
      mesh.position.set(
        cxFt - space.widthFt / 2,
        stageElevation(cxFt, cyFt),
        cyFt - space.depthFt / 2
      );
      itemGroup.add(mesh);
    });
  }, [items, selectedIds.join(','), space.id, space.widthFt, space.depthFt]);

  const snapToView = (mode) => {
    const { camera, orbit } = stateRef.current;
    if (!camera) return;
    if (mode === 'top') {
      // Straight overhead — stage at top of frame, audience entrance at bottom.
      orbit.polar = 0.02;
      orbit.azimuth = Math.PI / 2;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.05;
      orbit.target.set(0, 0, 0);
    } else if (mode === 'angle') {
      orbit.polar = Math.PI / 3.2;
      orbit.azimuth = Math.PI / 2 + 0.4;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.25;
      orbit.target.set(0, 2, 0);
    } else if (mode === 'front') {
      // Looking from audience entrance toward stage at near-eye level.
      orbit.polar = Math.PI / 2.3;
      orbit.azimuth = Math.PI / 2;
      orbit.distance = Math.max(space.widthFt, space.depthFt) * 1.1;
      orbit.target.set(0, 4, 0);
    }
    updateOrbitCamera(camera, orbit);
  };

  return (
    <div className="relative w-full h-full no-touch-action" style={{ minHeight: isMobile ? 320 : 540 }}>
      <div ref={containerRef} className="w-full h-full no-touch-action" style={{ minHeight: isMobile ? 320 : 540 }} />
      {!isMobile ? (
        <div className="absolute top-3 left-3 text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none">
          <div><span className="tv-gold">L-click item</span> · select / drag</div>
          <div><span className="tv-gold">Shift-click</span> · multi-select</div>
          <div><span className="tv-gold">R-click drag</span> · orbit camera</div>
          <div><span className="tv-gold">Scroll</span> · zoom</div>
        </div>
      ) : (
        <div className="absolute top-2 left-2 text-[9px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1 rounded border tv-divider pointer-events-none">
          <div><span className="tv-gold">Tap</span> item · drag to move</div>
          <div><span className="tv-gold">Pinch</span> · zoom · <span className="tv-gold">2-finger drag</span> · orbit</div>
        </div>
      )}
      <div className="absolute top-3 right-3 flex flex-col items-end gap-2">
        <div className="text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none">
          <div className="tv-gold font-medium">{space.name}</div>
          <div>{space.widthFt}′ × {space.depthFt}′ · {(space.widthFt * space.depthFt).toLocaleString()} sq ft</div>
        </div>
        <div className="flex gap-1 bg-[#0a0c10]/80 backdrop-blur border tv-divider rounded p-1">
          <button
            onClick={() => snapToView('angle')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Angled 3D perspective"
          >
            3D
          </button>
          <button
            onClick={() => snapToView('top')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Overhead aerial view"
          >
            ⬒ Top
          </button>
          <button
            onClick={() => snapToView('front')}
            className="px-2.5 py-1 text-[10px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
            title="Audience-eye view toward the stage"
          >
            Front
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// FULL-BUILDING 3D FLOOR PLAN
// ============================================================

function BuildingView({ isMobile, onOpenSpace, activeProject, editable, autoEdit, onVenueSaved }) {
  const containerRef = useRef(null);
  const labelLayerRef = useRef(null);
  const [mode, setMode] = useState(editable && autoEdit ? 'edit' : 'orbit'); // 'orbit' | 'roam' | 'edit'
  const [focusedRoomId, setFocusedRoomId] = useState(null);
  // Edit-mode (admin) state: selected room dims, unsaved flag, save status.
  const [editSel, setEditSel] = useState(null);   // { id, name, x, z, w, d }
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState('');

  const W = BUILDING.widthFt, D = BUILDING.depthFt;
  const focusedRoom = focusedRoomId ? BUILDING.rooms.find(r => r.id === focusedRoomId) : null;

  const st = useRef({
    scene: null, camera: null, renderer: null, raycaster: null, mouse: null,
    floorMeshes: [], roomFloorById: {}, roomGroupById: {}, labelByRoom: {}, labels: [], animId: null,
    handleGroup: null, editDraft: {}, editStart: {}, selRoom: null, editDrag: null,
    orbit: { azimuth: -Math.PI / 2 + 0.45, polar: Math.PI / 3.4, distance: 200, target: new THREE.Vector3(0, 2, 0) },
    desired: { azimuth: -Math.PI / 2 + 0.45, polar: Math.PI / 3.4, distance: 200, target: new THREE.Vector3(0, 2, 0) },
    fp: { pos: new THREE.Vector3(0, 5.5, -D / 2 + 8), yaw: 0, pitch: -0.05, keys: {}, btn: {} },
    mode: 'orbit',
    onFocus: null, onSelect: null, onDraftChange: null,
    rebuildRoom: null, updateHandles: null, selectRoom: null, setDraft: null,
  }).current;

  st.mode = mode;
  st.onFocus = setFocusedRoomId;
  st.onSelect = (id) => {
    const r = id ? BUILDING.rooms.find(x => x.id === id) : null;
    setEditSel(r ? { id: r.id, name: r.name, x: r.x, z: r.z, w: r.w, d: r.d } : null);
  };
  st.onDraftChange = (id) => {
    const r = BUILDING.rooms.find(x => x.id === id);
    if (r) setEditSel({ id: r.id, name: r.name, x: r.x, z: r.z, w: r.w, d: r.d });
    setDirty(true);
    setSaveMsg('');
  };

  // world-center helpers (origin at building center)
  const cx = (x, w) => -(x + w / 2 - W / 2);
  const cz = (z, d) => z + d / 2 - D / 2;

  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;
    const getW = () => container.clientWidth || 800;
    const getH = () => container.clientHeight || 600;
    let width = getW(), height = getH();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x070809);
    scene.fog = new THREE.Fog(0x070809, 120, 360);

    const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 800);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';
    renderer.domElement.style.borderRadius = '6px';

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.42));
    const key = new THREE.DirectionalLight(0xfff1d6, 0.8);
    key.position.set(W * 0.3, 130, D * 0.2);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    const sr = Math.max(W, D) * 0.75;
    Object.assign(key.shadow.camera, { left: -sr, right: sr, top: sr, bottom: -sr, near: 1, far: 360 });
    scene.add(key);
    scene.add(new THREE.HemisphereLight(0xc8a96a, 0x0a0c10, 0.45));

    // Exterior ground (parking / surrounds)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(W + 120, D + 120),
      new THREE.MeshStandardMaterial({ color: 0x0c0e13, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.06;
    ground.receiveShadow = true;
    scene.add(ground);

    // Building slab
    const slab = new THREE.Mesh(
      new THREE.PlaneGeometry(W, D),
      new THREE.MeshStandardMaterial({ color: 0x0f1218, roughness: 0.95 })
    );
    slab.rotation.x = -Math.PI / 2;
    slab.position.y = -0.02;
    slab.receiveShadow = true;
    scene.add(slab);

    const wallH = 9;
    const partitionMat = (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.95 });

    const floorMeshes = [];
    const roomFloorById = {};
    const roomGroupById = {};

    // building-coord (bx, bz) → world point (matches cx/cz helpers above)
    const bpt = (bx, bz) => new THREE.Vector3(W / 2 - bx, 0, bz - D / 2);

    // Build all meshes for one room (floor tile + partition walls) into a Group
    // so the room can be rebuilt in place when its geometry is edited in 3D.
    const buildRoomGroup = (r) => {
      const style = ROOM_TYPE_STYLE[r.type] || ROOM_TYPE_STYLE.service;
      const wm = partitionMat(style.wall);
      const g = new THREE.Group();
      g.userData.roomId = r.id;
      let tile;

      if (r.poly) {
        // Non-rectangular room: build the floor from its polygon and run a wall
        // along every edge except those flagged openEdges (on the building hull).
        const verts = r.poly.map(([bx, bz]) => bpt(bx, bz));
        const shape = new THREE.Shape();
        // ShapeGeometry lives in XY; after rotation.x = -90° a shape point (sx, sy)
        // maps to world (sx, 0, -sy), so feed each vertex as (worldX, -worldZ).
        verts.forEach((v, i) => i ? shape.lineTo(v.x, -v.z) : shape.moveTo(v.x, -v.z));
        shape.closePath();
        tile = new THREE.Mesh(
          new THREE.ShapeGeometry(shape),
          new THREE.MeshStandardMaterial({ color: style.floor, roughness: 0.9, metalness: 0.05 })
        );
        tile.rotation.x = -Math.PI / 2;
        tile.position.y = 0.02;

        const open = r.openEdges || [];
        const doorE = r.doorEdges || [];
        for (let i = 0; i < verts.length; i++) {
          if (open.includes(i)) continue;
          const a = verts[i], b = verts[(i + 1) % verts.length];
          const len = a.distanceTo(b);
          const rot = Math.atan2(b.x - a.x, b.z - a.z);
          const addSeg = (px, pz, l) => {
            const seg = new THREE.Mesh(new THREE.BoxGeometry(0.4, wallH, l), wm);
            seg.position.set(px, wallH / 2, pz);
            seg.rotation.y = rot;
            seg.castShadow = true; seg.receiveShadow = true;
            g.add(seg);
          };
          if (doorE.includes(i) && len > 5) {
            // leave a ~4ft doorway centred on this edge (two flanking segments)
            const gap = 4, segLen = (len - gap) / 2;
            const ux = (b.x - a.x) / len, uz = (b.z - a.z) / len;
            addSeg(a.x + ux * (segLen / 2), a.z + uz * (segLen / 2), segLen);
            addSeg(b.x - ux * (segLen / 2), b.z - uz * (segLen / 2), segLen);
          } else {
            addSeg((a.x + b.x) / 2, (a.z + b.z) / 2, len);
          }
        }
      } else {
        tile = new THREE.Mesh(
          new THREE.PlaneGeometry(Math.max(r.w - 0.6, 1), Math.max(r.d - 0.6, 1)),
          new THREE.MeshStandardMaterial({ color: style.floor, roughness: 0.9, metalness: 0.05 })
        );
        tile.rotation.x = -Math.PI / 2;
        tile.position.set(cx(r.x, r.w), 0.02, cz(r.z, r.d));

        // four partition walls around the room (with optional ~4ft door gaps)
        const ax = cx(r.x, r.w), az = cz(r.z, r.d);
        const mkWall = (w, d, ox, oz, doorAt, cutR) => {
          const addSeg = (sw, sd, sox, soz) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(sw, wallH, sd), wm);
            m.position.set(ax + sox, wallH / 2, az + soz);
            m.castShadow = true; m.receiveShadow = true;
            g.add(m);
          };
          const alongX = w >= d;
          const length = alongX ? w : d;
          if (cutR) {
            // physically delete a [from, to] section (feet from the wall's start),
            // rendering only the flanking segments that remain (no door/frame).
            const s = -length / 2, e = length / 2;
            const a = s + Math.max(0, cutR.from), b = s + Math.min(length, cutR.to);
            const lA = a - s, cA = (s + a) / 2;
            const lB = e - b, cB = (b + e) / 2;
            if (lA > 0.1) alongX ? addSeg(lA, d, ox + cA, oz) : addSeg(w, lA, ox, oz + cA);
            if (lB > 0.1) alongX ? addSeg(lB, d, ox + cB, oz) : addSeg(w, lB, ox, oz + cB);
            return;
          }
          if (doorAt == null || length <= 5) { addSeg(w, d, ox, oz); return; }
          // split the wall, leaving a 4ft gap centred at fraction doorAt
          const gap = 4, s = -length / 2, e = length / 2, dc = s + doorAt * length;
          const l1 = (dc - gap / 2) - s, c1 = (s + dc - gap / 2) / 2;
          const l2 = e - (dc + gap / 2), c2 = (dc + gap / 2 + e) / 2;
          if (l1 > 0.1) alongX ? addSeg(l1, d, ox + c1, oz) : addSeg(w, l1, ox, oz + c1);
          if (l2 > 0.1) alongX ? addSeg(l2, d, ox + c2, oz) : addSeg(w, l2, ox, oz + c2);
        };
        const skip = r.noWall || [];
        const door = r.door || null;
        const cut = r.cut || null;
        const at = side => (door && door.side === side) ? (door.at == null ? 0.5 : door.at) : null;
        const cutOf = side => (cut && cut.side === side) ? cut : null;
        if (!skip.includes('back'))  mkWall(r.w, 0.4, 0, -r.d / 2, at('back'), cutOf('back'));   // back
        if (!skip.includes('front')) mkWall(r.w, 0.4, 0, r.d / 2, at('front'), cutOf('front'));  // front
        if (!skip.includes('left'))  mkWall(0.4, r.d, -r.w / 2, 0, at('left'), cutOf('left'));   // left
        if (!skip.includes('right')) mkWall(0.4, r.d, r.w / 2, 0, at('right'), cutOf('right'));  // right
      }

      tile.receiveShadow = true;
      tile.userData.roomId = r.id;
      g.add(tile);
      roomGroupById[r.id] = g;
      roomFloorById[r.id] = tile;
      floorMeshes.push(tile);
      return g;
    };

    BUILDING.rooms.forEach(r => scene.add(buildRoomGroup(r)));

    // Outer perimeter wall (encloses the footprint)
    const perimMat = new THREE.MeshStandardMaterial({ color: 0x20242f, roughness: 0.9 });
    const perimH = 11;
    const mkPerim = (w, d, x, z) => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, perimH, d), perimMat);
      m.position.set(x, perimH / 2, z);
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m);
    };
    mkPerim(W + 1, 0.6, 0, -D / 2);
    mkPerim(W + 1, 0.6, 0, D / 2);
    mkPerim(0.6, D + 1, -W / 2, 0);
    mkPerim(0.6, D + 1, W / 2, 0);

    // Fixtures
    BUILDING.fixtures.forEach(f => {
      const fx = cx(f.x, f.w), fz = cz(f.z, f.d);
      if (f.kind === 'stage') {
        const platform = new THREE.Mesh(
          new THREE.BoxGeometry(f.w, 1.4, f.d),
          new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.6, metalness: 0.2 })
        );
        platform.position.set(fx, 0.7, fz);
        platform.castShadow = true; platform.receiveShadow = true;
        scene.add(platform);
        const trim = new THREE.Mesh(
          new THREE.BoxGeometry(f.w + 0.1, 0.08, f.d + 0.1),
          new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.5, metalness: 0.2 })
        );
        trim.position.set(fx, 1.4, fz);
        scene.add(trim);
      } else if (f.kind === 'led') {
        const ledH = 8;
        const led = new THREE.Mesh(
          new THREE.BoxGeometry(f.w, ledH, 0.5),
          new THREE.MeshStandardMaterial({ color: 0x2a1218, emissive: 0xb3253b, emissiveIntensity: 0.55, roughness: 0.4 })
        );
        led.position.set(fx, ledH / 2 + 1.4, fz);
        scene.add(led);
        const glow = new THREE.Mesh(
          new THREE.PlaneGeometry(f.w - 0.4, ledH - 0.8),
          new THREE.MeshBasicMaterial({ color: 0xff6a85, transparent: true, opacity: 0.22 })
        );
        glow.position.set(fx, ledH / 2 + 1.4, fz + 0.3);
        scene.add(glow);
      } else if (f.kind === 'bar' || f.kind === 'counter') {
        const h = f.kind === 'bar' ? 3.6 : 3;
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(f.w, h, f.d),
          new THREE.MeshStandardMaterial({ color: 0x2a2018, roughness: 0.7, metalness: 0.15 })
        );
        body.position.set(fx, h / 2, fz);
        body.castShadow = true; body.receiveShadow = true;
        scene.add(body);
        const top = new THREE.Mesh(
          new THREE.BoxGeometry(f.w + 0.2, 0.16, f.d + 0.2),
          new THREE.MeshStandardMaterial({ color: 0xc8a96a, metalness: 0.6, roughness: 0.3 })
        );
        top.position.set(fx, h, fz);
        scene.add(top);
      }
    });

    // Door / opening floor glyphs
    BUILDING.doors.forEach(dr => {
      const m = new THREE.Mesh(
        new THREE.CircleGeometry(1.4, 24),
        new THREE.MeshStandardMaterial({ color: 0x4ea36c, emissive: 0x4ea36c, emissiveIntensity: 0.5, transparent: true, opacity: 0.5 })
      );
      m.rotation.x = -Math.PI / 2;
      m.position.set(cx(dr.x, 0), 0.05, cz(dr.z, 0));
      scene.add(m);
    });

    // Project furniture group (populated/refreshed by the activeProject effect)
    const furnGroup = new THREE.Group();
    scene.add(furnGroup);
    st.furnGroup = furnGroup;

    // ---- DOM labels ----
    const labelLayer = labelLayerRef.current;
    const labels = [];
    const addLabel = (text, sub, world, kind) => {
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.transform = 'translate(-50%,-50%)';
      el.style.pointerEvents = 'none';
      el.style.whiteSpace = 'nowrap';
      el.style.textAlign = 'center';
      el.style.transition = 'opacity 120ms linear';
      if (kind === 'door') {
        el.innerHTML = `<span style="font-size:9px;color:#7fcf9a;background:rgba(10,12,16,.7);padding:1px 6px;border-radius:999px;border:1px solid rgba(78,163,108,.4)">${text}</span>`;
      } else {
        el.innerHTML =
          `<div style="font-size:12px;font-weight:600;color:${sub.color};text-shadow:0 1px 3px #000">${text}</div>` +
          (sub.text ? `<div style="font-size:9px;color:#9aa0b0;text-shadow:0 1px 2px #000">${sub.text}</div>` : '');
      }
      labelLayer.appendChild(el);
      const lb = { el, world };
      labels.push(lb);
      return lb;
    };
    const labelByRoom = {};
    BUILDING.rooms.forEach(r => {
      if (!r.name) return; // unnamed rooms (e.g. staging) render no label
      labelByRoom[r.id] = addLabel(r.name, { color: '#ffffff', text: '' }, new THREE.Vector3(cx(r.x, r.w), 7.5, cz(r.z, r.d)), 'room');
    });
    BUILDING.doors.forEach(dr => {
      addLabel(dr.label, {}, new THREE.Vector3(cx(dr.x, 0), 2.2, cz(dr.z, 0)), 'door');
    });
    // Labeled fixtures (Splash Bar, Fridge) — text callouts per the floor plan
    BUILDING.fixtures.forEach(f => {
      if (!f.label) return;
      addLabel(f.label, { color: '#c8a96a', text: '' }, new THREE.Vector3(cx(f.x, f.w), 4.5, cz(f.z, f.d)), 'room');
    });
    // LED wall / stage callout
    addLabel('LED Wall / Stage', { color: '#ff6a85', text: '' }, new THREE.Vector3(cx(45, 28), 11, cz(107, 0.6)), 'room');

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    updateOrbitCamera(camera, st.orbit);
    Object.assign(st, { scene, camera, renderer, raycaster, mouse, floorMeshes, roomFloorById, roomGroupById, labelByRoom, labels });

    // ---------- INPUT ----------
    const dom = renderer.domElement;
    const press = { down: false, x: 0, y: 0, moved: 0 };

    const ndc = (clientX, clientY) => {
      const rect = dom.getBoundingClientRect();
      mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    };

    // ---------- 3D EDIT (admin: move / resize rooms) ----------
    const handleGroup = new THREE.Group();
    scene.add(handleGroup);
    st.handleGroup = handleGroup;
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const groundHit = new THREE.Vector3();

    // pointer → building feet (bx from front-left). null if it misses the floor.
    const pointerBuilding = (clientX, clientY) => {
      ndc(clientX, clientY);
      raycaster.setFromCamera(mouse, camera);
      if (!raycaster.ray.intersectPlane(groundPlane, groundHit)) return null;
      return { bx: W / 2 - groundHit.x, bz: groundHit.z + D / 2 };
    };

    const highlightTile = (id, on) => {
      const t = roomFloorById[id];
      if (!t) return;
      t.material.emissive = new THREE.Color(on ? 0x4ea36c : 0x000000);
      t.material.emissiveIntensity = on ? 0.45 : 0;
      t.material.needsUpdate = true;
    };

    const rebuildRoom = (id) => {
      const old = roomGroupById[id];
      if (old) { scene.remove(old); disposeGroup(old); }
      const oldTile = roomFloorById[id];
      const idx = floorMeshes.indexOf(oldTile);
      if (idx >= 0) floorMeshes.splice(idx, 1);
      const r = BUILDING.rooms.find(x => x.id === id);
      if (!r) return;
      scene.add(buildRoomGroup(r));
      if (st.selRoom === id) highlightTile(id, true);
      const lb = labelByRoom[id];
      if (lb) lb.world.set(cx(r.x, r.w), 7.5, cz(r.z, r.d));
    };

    const updateHandles = (id) => {
      while (handleGroup.children.length) {
        const c = handleGroup.children[0];
        handleGroup.remove(c);
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
      }
      if (!id || st.mode !== 'edit') return;
      const r = BUILDING.rooms.find(x => x.id === id);
      if (!r) return;
      const corners = [
        ['fl', r.x, r.z], ['fr', r.x + r.w, r.z],
        ['bl', r.x, r.z + r.d], ['br', r.x + r.w, r.z + r.d],
      ];
      corners.forEach(([key, bx, bz]) => {
        const s = new THREE.Mesh(
          new THREE.SphereGeometry(1.6, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xc8a96a, emissive: 0xc8a96a, emissiveIntensity: 0.7, roughness: 0.3 })
        );
        const w = bpt(bx, bz); s.position.set(w.x, 2, w.z);
        s.userData.handle = key;
        handleGroup.add(s);
      });
    };

    const selectRoom = (id) => {
      if (st.selRoom && st.selRoom !== id) highlightTile(st.selRoom, false);
      st.selRoom = id;
      if (id) highlightTile(id, true);
      updateHandles(id);
      st.onSelect && st.onSelect(id);
    };

    // Merge a partial geometry change for one room into the draft + apply it.
    const setDraft = (id, g) => {
      st.editDraft[id] = { ...(st.editDraft[id] || {}), ...g };
      applyVenueOverrides({ rooms: st.editDraft });
      rebuildRoom(id);
      updateHandles(id);
      st.onDraftChange && st.onDraftChange(id);
    };

    const rebuildAll = () => { BUILDING.rooms.forEach(r => rebuildRoom(r.id)); };

    st.rebuildRoom = rebuildRoom;
    st.updateHandles = updateHandles;
    st.selectRoom = selectRoom;
    st.setDraft = setDraft;
    st.rebuildAll = rebuildAll;

    const applyMove = (drag, pb) => {
      const r = BUILDING.rooms.find(x => x.id === drag.id);
      if (!r) return;
      let nx = Math.round(pb.bx - drag.offx);
      let nz = Math.round(pb.bz - drag.offz);
      nx = Math.max(0, Math.min(W - r.w, nx));
      nz = Math.max(0, Math.min(D - r.d, nz));
      if (nx === r.x && nz === r.z) return;
      setDraft(drag.id, { x: nx, z: nz, w: r.w, d: r.d });
    };

    const applyResize = (drag, pb) => {
      const bx = Math.round(Math.max(0, Math.min(W, pb.bx)));
      const bz = Math.round(Math.max(0, Math.min(D, pb.bz)));
      const nx = Math.min(drag.anchorBx, bx), nX = Math.max(drag.anchorBx, bx);
      const nz = Math.min(drag.anchorBz, bz), nZ = Math.max(drag.anchorBz, bz);
      const nw = Math.max(nX - nx, 2), nd = Math.max(nZ - nz, 2);
      setDraft(drag.id, { x: nx, z: nz, w: nw, d: nd });
    };

    // In edit mode: grab a corner handle → resize, a room floor → select+move,
    // empty space → deselect (and let the drag orbit the camera instead).
    const editPick = (clientX, clientY) => {
      ndc(clientX, clientY);
      raycaster.setFromCamera(mouse, camera);
      const hHit = raycaster.intersectObjects(handleGroup.children, false)[0];
      if (hHit && st.selRoom) {
        const r = BUILDING.rooms.find(x => x.id === st.selRoom);
        if (r) {
          const key = hHit.object.userData.handle;
          const anchor = {
            fl: [r.x + r.w, r.z + r.d], fr: [r.x, r.z + r.d],
            bl: [r.x + r.w, r.z], br: [r.x, r.z],
          }[key];
          st.editDrag = { type: 'resize', id: r.id, anchorBx: anchor[0], anchorBz: anchor[1] };
          return true;
        }
      }
      const fHit = raycaster.intersectObjects(st.floorMeshes, false)[0];
      if (fHit && fHit.object.userData.roomId) {
        const id = fHit.object.userData.roomId;
        const r = BUILDING.rooms.find(x => x.id === id);
        selectRoom(id);
        // grab offset from the exact floor-hit point (building feet)
        const gx = W / 2 - fHit.point.x, gz = fHit.point.z + D / 2;
        st.editDrag = { type: 'move', id, offx: gx - r.x, offz: gz - r.z };
        return true;
      }
      selectRoom(null);
      return false;
    };

    const onDown = (e) => {
      press.down = true; press.x = e.clientX; press.y = e.clientY; press.moved = 0;
      if (st.mode === 'edit') editPick(e.clientX, e.clientY);
    };
    const onMove = (e) => {
      if (st.mode === 'edit' && st.editDrag) {
        const pb = pointerBuilding(e.clientX, e.clientY);
        if (!pb) return;
        if (st.editDrag.type === 'move') applyMove(st.editDrag, pb);
        else applyResize(st.editDrag, pb);
        return;
      }
      if (!press.down) return;
      const dx = e.clientX - press.x, dy = e.clientY - press.y;
      press.moved += Math.abs(dx) + Math.abs(dy);
      press.x = e.clientX; press.y = e.clientY;
      if (st.mode === 'orbit' || st.mode === 'edit') {
        // edit mode: dragging empty space (no grabbed room) still orbits the camera
        st.desired.azimuth -= dx * 0.007;
        st.desired.polar -= dy * 0.007;
        st.desired.polar = Math.max(0.05, Math.min(Math.PI / 2 - 0.04, st.desired.polar));
      } else {
        st.fp.yaw -= dx * 0.005;
        st.fp.pitch -= dy * 0.005;
        st.fp.pitch = Math.max(-1.2, Math.min(1.2, st.fp.pitch));
      }
    };
    const onUp = (e) => {
      if (st.mode === 'edit') { st.editDrag = null; press.down = false; return; }
      if (press.down && press.moved < 6 && st.mode === 'orbit') {
        // treat as click → focus room
        ndc(e.clientX, e.clientY);
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObjects(st.floorMeshes, false)[0];
        if (hit && hit.object.userData.roomId) st.onFocus(hit.object.userData.roomId);
        else st.onFocus(null);
      }
      press.down = false;
    };
    const onWheel = (e) => {
      e.preventDefault();
      if (st.mode === 'roam') return;
      st.desired.distance *= e.deltaY > 0 ? 1.05 : 0.95;
      st.desired.distance = Math.max(30, Math.min(340, st.desired.distance));
    };
    const onKey = (down) => (e) => {
      const k = e.key.toLowerCase();
      if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
      st.fp.keys[k] = down;
    };
    const keyDown = onKey(true), keyUp = onKey(false);

    dom.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    dom.addEventListener('wheel', onWheel, { passive: false });
    dom.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', keyDown);
    window.addEventListener('keyup', keyUp);

    // touch (1-finger look/orbit, 2-finger pinch zoom in orbit)
    const touch = { mode: null, lastDist: 0, x: 0, y: 0, moved: 0 };
    const onTouchStart = (e) => {
      if (e.touches.length === 1) {
        touch.mode = 'one'; touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; touch.moved = 0;
        if (st.mode === 'edit') editPick(touch.x, touch.y);
      } else if (e.touches.length === 2) {
        touch.mode = 'pinch';
        const a = e.touches[0], b = e.touches[1];
        touch.lastDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      }
      e.preventDefault();
    };
    const onTouchMove = (e) => {
      if (touch.mode === 'one' && e.touches.length === 1) {
        const t = e.touches[0];
        const dx = t.clientX - touch.x, dy = t.clientY - touch.y;
        touch.moved += Math.abs(dx) + Math.abs(dy);
        touch.x = t.clientX; touch.y = t.clientY;
        if (st.mode === 'edit' && st.editDrag) {
          const pb = pointerBuilding(t.clientX, t.clientY);
          if (pb) (st.editDrag.type === 'move' ? applyMove : applyResize)(st.editDrag, pb);
        } else if (st.mode === 'orbit' || st.mode === 'edit') {
          st.desired.azimuth -= dx * 0.007;
          st.desired.polar -= dy * 0.007;
          st.desired.polar = Math.max(0.05, Math.min(Math.PI / 2 - 0.04, st.desired.polar));
        } else {
          st.fp.yaw -= dx * 0.005;
          st.fp.pitch -= dy * 0.005;
          st.fp.pitch = Math.max(-1.2, Math.min(1.2, st.fp.pitch));
        }
      } else if (touch.mode === 'pinch' && e.touches.length === 2 && st.mode !== 'roam') {
        const a = e.touches[0], b = e.touches[1];
        const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        if (touch.lastDist > 0) {
          st.desired.distance *= touch.lastDist / dist;
          st.desired.distance = Math.max(30, Math.min(340, st.desired.distance));
        }
        touch.lastDist = dist;
      }
      e.preventDefault();
    };
    const onTouchEnd = (e) => {
      if (st.mode === 'edit') { st.editDrag = null; }
      else if (touch.mode === 'one' && touch.moved < 8 && st.mode === 'orbit') {
        ndc(touch.x, touch.y);
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObjects(st.floorMeshes, false)[0];
        if (hit && hit.object.userData.roomId) st.onFocus(hit.object.userData.roomId);
      }
      if (e.touches.length === 0) touch.mode = null;
    };
    dom.addEventListener('touchstart', onTouchStart, { passive: false });
    dom.addEventListener('touchmove', onTouchMove, { passive: false });
    dom.addEventListener('touchend', onTouchEnd);
    dom.addEventListener('touchcancel', onTouchEnd);

    const onResize = () => {
      width = getW(); height = getH();
      if (!width || !height) return;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    };
    window.addEventListener('resize', onResize);
    // Keep the canvas matched to its container even when the surrounding
    // layout changes without a window resize (e.g. opening the admin combined
    // view, panels showing/hiding). Without this the canvas keeps its initial
    // size and a black band covers part of the layout.
    const ro = new ResizeObserver(onResize);
    ro.observe(container);

    // ---------- ANIMATE ----------
    const proj = new THREE.Vector3();
    const clampX = W / 2 - 3, clampZ = D / 2 - 3;
    const animate = () => {
      st.animId = requestAnimationFrame(animate);

      if (st.mode === 'orbit' || st.mode === 'edit') {
        const o = st.orbit, d = st.desired, l = 0.16;
        o.azimuth += (d.azimuth - o.azimuth) * l;
        o.polar += (d.polar - o.polar) * l;
        o.distance += (d.distance - o.distance) * l;
        o.target.lerp(d.target, l);
        updateOrbitCamera(camera, o);
      } else {
        const fp = st.fp;
        const speed = 0.7;
        const f = (fp.keys['w'] || fp.keys['arrowup'] || fp.btn.fwd ? 1 : 0) - (fp.keys['s'] || fp.keys['arrowdown'] || fp.btn.back ? 1 : 0);
        const s = (fp.keys['d'] || fp.keys['arrowright'] || fp.btn.right ? 1 : 0) - (fp.keys['a'] || fp.keys['arrowleft'] || fp.btn.left ? 1 : 0);
        if (f) { fp.pos.x += Math.sin(fp.yaw) * speed * f; fp.pos.z += Math.cos(fp.yaw) * speed * f; }
        if (s) { fp.pos.x -= Math.cos(fp.yaw) * speed * s; fp.pos.z += Math.sin(fp.yaw) * speed * s; }
        fp.pos.x = Math.max(-clampX, Math.min(clampX, fp.pos.x));
        fp.pos.z = Math.max(-clampZ, Math.min(clampZ, fp.pos.z));
        fp.pos.y = 5.5;
        camera.position.copy(fp.pos);
        camera.lookAt(
          fp.pos.x + Math.sin(fp.yaw) * Math.cos(fp.pitch),
          fp.pos.y + Math.sin(fp.pitch),
          fp.pos.z + Math.cos(fp.yaw) * Math.cos(fp.pitch)
        );
      }

      // labels
      for (const lb of st.labels) {
        proj.copy(lb.world).project(camera);
        if (proj.z > 1) { lb.el.style.opacity = '0'; continue; }
        const sx = (proj.x * 0.5 + 0.5) * width;
        const sy = (-proj.y * 0.5 + 0.5) * height;
        lb.el.style.left = sx + 'px';
        lb.el.style.top = sy + 'px';
        const dist = camera.position.distanceTo(lb.world);
        lb.el.style.opacity = dist > 300 ? '0' : (dist > 220 ? '0.35' : '1');
      }

      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(st.animId);
      dom.removeEventListener('mousedown', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      dom.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', keyDown);
      window.removeEventListener('keyup', keyUp);
      dom.removeEventListener('touchstart', onTouchStart);
      dom.removeEventListener('touchmove', onTouchMove);
      dom.removeEventListener('touchend', onTouchEnd);
      dom.removeEventListener('touchcancel', onTouchEnd);
      window.removeEventListener('resize', onResize);
      ro.disconnect();
      st.labels.forEach(l => l.el.remove());
      st.labels = [];
      scene.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(m => m.dispose());
      });
      renderer.dispose();
      if (dom.parentNode) dom.parentNode.removeChild(dom);
    };
    // eslint-disable-next-line
  }, []);

  // Focus animation + highlight when a room is selected (orbit mode only)
  useEffect(() => {
    // highlight tiles
    BUILDING.rooms.forEach(r => {
      const tile = st.roomFloorById[r.id];
      if (!tile) return;
      const on = r.id === focusedRoomId;
      tile.material.emissive = new THREE.Color(on ? 0xc8a96a : 0x000000);
      tile.material.emissiveIntensity = on ? 0.35 : 0;
      tile.material.needsUpdate = true;
    });
    if (focusedRoom && st.mode === 'orbit') {
      const r = focusedRoom;
      st.desired.target.set(cx(r.x, r.w), 2, cz(r.z, r.d));
      st.desired.distance = Math.max(r.w, r.d) * 1.9 + 26;
      st.desired.polar = Math.PI / 3.6;
    }
    // eslint-disable-next-line
  }, [focusedRoomId]);

  // Render the active project's furniture as real 3D meshes inside each room.
  //
  // IMPORTANT axis note (prevents the "chairs face the wrong way" bug):
  // The Layout Designer and the building use OPPOSITE depth axes —
  //   • Designer: the stage sits at the TOP of the canvas (yFt = 0) and chairs
  //     face -z (toward yFt = 0 / the stage).
  //   • Building: the stage / LED wall is at the BACK of the room (high z).
  // So designer→building is a proper 180° rotation about Y (reflect BOTH x and
  // z, and rotate each item's facing by 180°). Do NOT use a bare x-mirror — that
  // is improper and leaves furniture facing backwards. Keeping x and z reflected
  // together makes it a true rotation, so chairs correctly face the stage.
  useEffect(() => {
    const fg = st.furnGroup;
    if (!fg) return;
    while (fg.children.length > 0) {
      const child = fg.children[0];
      fg.remove(child);
      disposeGroup(child);
    }
    if (!activeProject) return;
    BUILDING.rooms.forEach(room => {
      const layout = activeProject.layouts[room.id];
      if (!layout || !layout.length) return;
      layout.forEach(item => {
        const f = FURN_BY_ID[item.furnId];
        if (!f) return;
        const mesh = buildFurnitureMesh(item, f, false);
        const swap = item.rotation === 90 || item.rotation === 270;
        const sizeW = f.shape === 'circle' ? f.diameter : (swap ? f.h : f.w);
        const sizeD = f.shape === 'circle' ? f.diameter : (swap ? f.w : f.h);
        // Reflect x (matches the mirrored walls) and reflect z within the room
        // (designer yFt = 0 → building back wall). Together = 180° rotation.
        const dataX = room.x + item.xFt + sizeW / 2;
        const dataZ = room.z + room.d - item.yFt - sizeD / 2;
        mesh.position.set(W / 2 - dataX, 0, dataZ - D / 2);
        // Orientation: designer mesh.rotation.y is -(rot); add 180° for the flip.
        mesh.rotation.y = Math.PI - ((item.rotation || 0) * Math.PI) / 180;
        fg.add(mesh);
      });
    });
    // eslint-disable-next-line
  }, [activeProject]);

  const overview = () => {
    setFocusedRoomId(null);
    st.desired.target.set(0, 2, 0);
    st.desired.distance = 200;
    st.desired.polar = Math.PI / 3.4;
    st.desired.azimuth = -Math.PI / 2 + 0.45;
  };

  const topView = () => {
    setMode('orbit');
    setFocusedRoomId(null);
    st.desired.target.set(0, 0, 0);
    st.desired.distance = Math.max(W, D) * 1.18;
    st.desired.polar = 0.035;            // straight down (aerial)
    st.desired.azimuth = -Math.PI / 2;    // front (entrance) at bottom of frame
  };

  const enterRoam = () => {
    // seed first-person camera at the main entrance, looking in
    st.fp.pos.set(0, 5.5, -D / 2 + 8);
    st.fp.yaw = 0; st.fp.pitch = -0.05;
    setMode('roam');
  };

  const setBtn = (name, val) => { st.fp.btn[name] = val; };

  // ---- Edit mode (admin) ----
  const enterEdit = () => {
    setFocusedRoomId(null);
    st.editStart = {};
    BUILDING.rooms.forEach(r => { st.editStart[r.id] = { x: r.x, z: r.z, w: r.w, d: r.d }; });
    st.editDraft = {};
    st.selRoom = null;
    setEditSel(null); setDirty(false); setSaveMsg('');
    // frame the whole footprint from a gentle top-down angle for easy dragging
    st.desired.target.set(0, 0, 0);
    st.desired.distance = Math.max(W, D) * 1.05;
    st.desired.polar = 0.18;
    st.desired.azimuth = -Math.PI / 2;
    setMode('edit');
  };

  const exitEdit = () => {
    // revert any unsaved changes back to where editing started
    applyVenueOverrides({ rooms: st.editStart });
    if (st.rebuildAll) st.rebuildAll();
    st.editDraft = {}; st.selRoom = null;
    if (st.updateHandles) st.updateHandles(null);
    BUILDING.rooms.forEach(r => { const t = st.roomFloorById[r.id]; if (t) { t.material.emissive = new THREE.Color(0x000000); t.material.emissiveIntensity = 0; } });
    setEditSel(null); setDirty(false); setSaveMsg('');
    setMode('orbit');
    overview();
  };

  const saveEdit = async () => {
    setSaving(true); setSaveMsg('');
    try {
      await api.saveVenue(st.editDraft);
      setDirty(false);
      setSaveMsg('Saved — floor plan updated for everyone.');
      if (onVenueSaved) onVenueSaved(); // bumps version → remounts with the new geometry
    } catch (e) {
      setSaveMsg(e.message || 'Could not save.');
    } finally {
      setSaving(false);
    }
  };

  const resetSelected = () => {
    if (!st.selRoom) return;
    const b = BUILDING_DEFAULT_GEOM[st.selRoom];
    st.setDraft(st.selRoom, { x: b.x, z: b.z, w: b.w, d: b.d });
  };

  const commitField = (k, raw) => {
    if (!st.selRoom) return;
    const v = parseFloat(raw);
    if (!isFinite(v)) return;
    const r = BUILDING.rooms.find(x => x.id === st.selRoom);
    let g = { x: r.x, z: r.z, w: r.w, d: r.d, [k]: v };
    g.w = Math.max(g.w, 2); g.d = Math.max(g.d, 2);
    g.x = Math.max(0, Math.min(W - g.w, g.x));
    g.z = Math.max(0, Math.min(D - g.d, g.z));
    st.setDraft(st.selRoom, g);
  };

  // Auto-enter edit mode (Venue Layout nav): frame the top-down camera and
  // snapshot the starting geometry, since mode is initialized to 'edit' directly.
  useEffect(() => {
    if (editable && autoEdit) enterEdit();
    // eslint-disable-next-line
  }, []);

  return (
    <div className="relative w-full h-full no-touch-action" style={{ minHeight: isMobile ? 360 : 560 }}>
      <div ref={containerRef} className="w-full h-full no-touch-action" style={{ minHeight: isMobile ? 360 : 560 }} />
      <div ref={labelLayerRef} className="absolute inset-0 overflow-hidden pointer-events-none" />

      {/* Mode toggle */}
      <div className="absolute top-3 left-3 flex gap-1 bg-[#0a0c10]/80 backdrop-blur border tv-divider rounded p-1">
        <button
          onClick={() => setMode('orbit')}
          className={classNames("px-3 py-1.5 text-[11px] rounded border", mode === 'orbit' ? "tab-active" : "tv-panel-2 tv-divider tv-muted hover:text-white")}
        >Orbit</button>
        <button
          onClick={enterRoam}
          className={classNames("px-3 py-1.5 text-[11px] rounded border", mode === 'roam' ? "tab-active" : "tv-panel-2 tv-divider tv-muted hover:text-white")}
        >Free Roam</button>
        <button
          onClick={topView}
          className="px-3 py-1.5 text-[11px] rounded border tv-panel-2 tv-divider tv-muted hover:text-white hover:border-[var(--tv-gold)]"
          title="Snap straight overhead — easiest way to click rooms"
        >⬒ Top View</button>
        {editable && (
          <button
            onClick={() => (mode === 'edit' ? exitEdit() : enterEdit())}
            className={classNames("px-3 py-1.5 text-[11px] rounded border", mode === 'edit' ? "tab-active" : "tv-panel-2 tv-divider tv-muted hover:text-white hover:border-[var(--tv-gold)]")}
            title="Move & resize rooms — saved for everyone"
          >✎ Edit Layout</button>
        )}
      </div>

      {/* Controls hint */}
      <div className="absolute bottom-3 left-3 text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none">
        {mode === 'edit' ? (
          <>
            <div><span className="tv-gold">Click a room</span> · select &nbsp; <span className="tv-gold">Drag it</span> · move</div>
            <div><span className="tv-gold">Drag a gold corner</span> · resize &nbsp; <span className="tv-gold">Drag empty</span> · orbit</div>
          </>
        ) : mode === 'orbit' ? (
          <>
            <div><span className="tv-gold">Drag</span> · orbit &nbsp; <span className="tv-gold">Scroll</span> · zoom</div>
            <div><span className="tv-gold">Click a room</span> · focus &amp; details</div>
          </>
        ) : (
          <>
            <div><span className="tv-gold">Drag</span> · look around</div>
            <div><span className="tv-gold">{isMobile ? 'On-screen pad' : 'W A S D / arrows'}</span> · walk</div>
          </>
        )}
      </div>

      {/* Title chip */}
      <div className="absolute top-3 right-3 text-[10px] tv-muted bg-[#0a0c10]/80 backdrop-blur px-2 py-1.5 rounded border tv-divider pointer-events-none text-right">
        <div className="tv-gold font-medium">TriVision Event Center</div>
        <div>{W}′ × {D}′ footprint</div>
      </div>

      {/* Focused room panel */}
      {focusedRoom && mode === 'orbit' && (
        <div className="absolute top-16 right-3 w-56 tv-panel border tv-divider rounded-lg p-3 shadow-xl">
          <div className="flex items-start justify-between gap-2">
            <div>
              <div className="text-sm font-semibold tv-gold">{focusedRoom.name}</div>
              {focusedRoom.sub && <div className="text-[11px] tv-muted">{focusedRoom.sub}</div>}
            </div>
            <button onClick={overview} className="tv-muted hover:text-white text-base leading-none">✕</button>
          </div>
          <div className="mt-2 text-[11px] tv-muted">
            {focusedRoom.w}′ × {focusedRoom.d}′ · {(focusedRoom.w * focusedRoom.d).toLocaleString()} sq ft
          </div>
          {onOpenSpace && (
            <button
              onClick={() => onOpenSpace(focusedRoom.id)}
              className="mt-3 w-full tv-gold-bg text-xs font-medium py-1.5 rounded"
            >＋ Add chairs &amp; designs →</button>
          )}
        </div>
      )}

      {/* Edit-mode panel (admin) */}
      {mode === 'edit' && (
        <div className="absolute top-16 right-3 w-60 tv-panel border tv-divider rounded-lg p-3 shadow-xl">
          <div className="flex items-center justify-between gap-2">
            <div className="text-sm font-semibold tv-gold">Edit Floor Plan</div>
            {dirty && <span className="text-[10px] tv-muted">Unsaved</span>}
          </div>
          {editSel ? (
            <div className="mt-2 space-y-2">
              <div className="text-[12px] font-medium">{editSel.name}</div>
              <div className="grid grid-cols-2 gap-2">
                {[['x', 'X (ft)'], ['z', 'Z (ft)'], ['w', 'Width'], ['d', 'Depth']].map(([k, label]) => (
                  <label key={k} className="text-[10px] tv-muted">
                    {label}
                    <input
                      type="number"
                      value={Math.round(editSel[k])}
                      onChange={(e) => commitField(k, e.target.value)}
                      className="mt-0.5 w-full px-2 py-1 rounded tv-panel-2 border tv-divider text-sm text-white"
                    />
                  </label>
                ))}
              </div>
              <button
                onClick={resetSelected}
                className="w-full px-3 py-1.5 text-[11px] rounded border tv-divider tv-panel-2 hover:border-[var(--tv-gold)]"
              >Reset this room</button>
            </div>
          ) : (
            <div className="mt-2 text-[11px] tv-muted">Click a room to move or resize it. Drag the room to reposition, or drag a gold corner to resize.</div>
          )}
          <div className="mt-3 flex gap-2">
            <button
              onClick={exitEdit}
              className="flex-1 px-3 py-1.5 text-xs rounded border tv-divider tv-panel-2 hover:border-red-400 hover:text-red-300"
            >Cancel</button>
            <button
              onClick={saveEdit}
              disabled={saving || !dirty}
              className="flex-1 px-3 py-1.5 text-xs rounded tv-gold-bg font-medium disabled:opacity-50"
            >{saving ? 'Saving…' : 'Save'}</button>
          </div>
          {saveMsg && <div className="mt-2 text-[11px] tv-gold">{saveMsg}</div>}
        </div>
      )}

      {/* Free-roam on-screen pad (mobile) */}
      {mode === 'roam' && isMobile && (
        <div className="absolute bottom-4 right-4 grid grid-cols-3 gap-1.5" style={{ width: 150 }}>
          <div />
          <RoamBtn label="▲" onDown={() => setBtn('fwd', true)} onUp={() => setBtn('fwd', false)} />
          <div />
          <RoamBtn label="◀" onDown={() => setBtn('left', true)} onUp={() => setBtn('left', false)} />
          <RoamBtn label="▼" onDown={() => setBtn('back', true)} onUp={() => setBtn('back', false)} />
          <RoamBtn label="▶" onDown={() => setBtn('right', true)} onUp={() => setBtn('right', false)} />
        </div>
      )}

      {/* Overview button when focused */}
      {focusedRoom && mode === 'orbit' && (
        <button
          onClick={overview}
          className="absolute bottom-3 right-3 px-3 py-1.5 text-[11px] rounded tv-panel-2 border tv-divider hover:border-[var(--tv-gold)] hover:text-white tv-muted"
        >⤢ Overview</button>
      )}
    </div>
  );
}
